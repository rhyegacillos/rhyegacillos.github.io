<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaGen Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050d1c; overflow: hidden; }
    .wrap { display: flex; flex-direction: column; height: 100%; }
    .legend {
      display: flex; gap: 18px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
      padding: 6px 14px;
      background: rgba(13,30,56,0.88); border: 1px solid rgba(149,175,219,0.15);
      border-radius: 5px; margin: 4px 4px 0;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 9px; color: #8fa3c0; font-family: 'IBM Plex Mono', monospace; }
    .legend .fs-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      background: transparent; border: 1px solid rgba(149,175,219,0.25);
      color: #8fa3c0; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 3px 10px; border-radius: 5px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    .legend .fs-btn:hover { border-color: #3d7eff; color: #3d7eff; }
    .legend .fs-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }
    svg { width: 100%; flex: 1; min-height: 0; }
    .node, .conn { transition: opacity 0.18s; }
    .node > rect { transition: fill 0.18s, stroke 0.18s; }
    .faded { opacity: 0.12 !important; }
    .highlighted > rect:first-child { fill: #162b52 !important; stroke-opacity: 1 !important; stroke-width: 2.4px !important; }
    .conn-dot { pointer-events: none; transition: opacity 0.18s; }
    .conn-dot.faded { opacity: 0.12 !important; }
    #tooltip {
      position: absolute;
      background: rgba(5,13,28,0.96);
      border: 1px solid rgba(149,175,219,0.28);
      border-radius: 7px;
      padding: 9px 13px;
      color: #e2eaf8;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      line-height: 1.55;
      max-width: 250px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    #tooltip.vis { opacity: 1; }
    #tooltip b { color: #3d7eff; display: block; margin-bottom: 3px; font-size: 12.5px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="legend">
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#3d7eff" stroke-width="1.8" marker-end="url(#leg-blue)"/></svg>
      Request · parallel
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-blue)"/></svg>
      Response / return
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-teal)"/></svg>
      JWT auth
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#10b981" stroke-width="1.8" marker-end="url(#leg-green)"/></svg>
      Pipeline flow
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#leg-purple)"/></svg>
      Artifact storage
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#d4a017" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-amber)"/></svg>
      Secret injection
    </div>
    <div class="legend-item" style="color:#475569; font-size:9px;">Hover nodes to highlight paths</div>
    <button class="fs-btn" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      Fullscreen
    </button>
  </div>
<svg style="position:absolute;width:0;height:0">
  <defs>
    <marker id="leg-blue"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#3d7eff"/></marker>
    <marker id="leg-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#10b981"/></marker>
    <marker id="leg-teal"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#2dd4bf"/></marker>
    <marker id="leg-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#a78bfa"/></marker>
    <marker id="leg-amber"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#d4a017"/></marker>
  </defs>
</svg>
<svg viewBox="0 0 1140 660" preserveAspectRatio="xMidYMid meet" role="img" aria-label="IdeaGen Architecture Diagram">
  <defs>
    <marker id="arr-blue"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#3d7eff"/></marker>
    <marker id="arr-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#10b981"/></marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#a78bfa"/></marker>
    <marker id="arr-teal"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#2dd4bf"/></marker>
    <marker id="arr-amber"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#d4a017"/></marker>
  </defs>


  <!-- ═══ ZONE BACKGROUNDS ═══ -->
  <rect x="18"  y="46" width="200" height="578" rx="4" fill="rgba(13,40,90,0.14)"/>
  <rect x="222" y="46" width="222" height="578" rx="4" fill="rgba(60,20,100,0.10)"/>
  <rect x="448" y="46" width="676" height="578" rx="4" fill="rgba(5,25,15,0.07)"/>

  <!-- ═══ CONNECTIONS ═══ -->

  <!-- c-req: Next.js → FastAPI -->
  <path id="c-req"    class="conn" d="M 190,95 L 232,95"                                 stroke="#3d7eff" stroke-width="1.8" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-resp: FastAPI → Next.js -->
  <path id="c-resp"   class="conn" d="M 232,109 L 190,109"                               stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-auth: Clerk → FastAPI -->
  <path id="c-auth"   class="conn" d="M 190,201 L 305,201 L 305,128"                    stroke="#2dd4bf" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-teal)"/>
  <!-- c-config: Run Config → FastAPI (routes through gap between zones) -->
  <path id="c-config" class="conn" d="M 190,277 L 218,277 L 218,102 L 232,102"          stroke="#3d7eff" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-route: FastAPI → LLM Router -->
  <path id="c-route"  class="conn" d="M 407,95 L 452,95"                                 stroke="#3d7eff" stroke-width="1.8" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-result: LLM Router → FastAPI -->
  <path id="c-result" class="conn" d="M 452,109 L 407,109"                               stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-pipe: FastAPI → Pipeline -->
  <path id="c-pipe"   class="conn" d="M 332,128 L 332,378"                               stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-store: Pipeline → PostgreSQL -->
  <path id="c-store"  class="conn" d="M 784,423 L 800,423"                               stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- c-pdf: PostgreSQL → WeasyPrint -->
  <path id="c-pdf"    class="conn" d="M 955,390 L 970,390"                               stroke="#a78bfa" stroke-width="1.6" fill="none" marker-end="url(#arr-purple)"/>
  <!-- c-email: WeasyPrint → Resend -->
  <path id="c-email"  class="conn" d="M 1035,402 L 1035,430"                             stroke="#a78bfa" stroke-width="1.6" fill="none" marker-end="url(#arr-purple)"/>
  <!-- c-return: PostgreSQL → Next.js -->
  <path id="c-return" class="conn" d="M 877,468 L 877,560 L 109,560 L 109,128"          stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-secrets: Secrets Manager → FastAPI (inject at startup) -->
  <path id="c-secrets" class="conn" d="M 232,277 L 220,277 L 220,100 L 232,100" stroke="#d4a017" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-amber)"/>

  <!-- ═══ ANIMATED FLOW DOTS ═══ -->
  <circle class="conn-dot" data-conn="c-req" r="2.5" fill="#3d7eff">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 190,95 L 232,95"/>
  </circle>
  <circle class="conn-dot" data-conn="c-resp" r="2.5" fill="#3d7eff">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 232,109 L 190,109"/>
  </circle>
  <circle class="conn-dot" data-conn="c-auth" r="2.5" fill="#2dd4bf">
    <animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto" path="M 190,201 L 305,201 L 305,128"/>
  </circle>
  <circle class="conn-dot" data-conn="c-config" r="2" fill="#3d7eff">
    <animateMotion dur="2s" repeatCount="indefinite" rotate="auto" path="M 190,277 L 218,277 L 218,102 L 232,102"/>
  </circle>
  <circle class="conn-dot" data-conn="c-route" r="2.5" fill="#3d7eff">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 407,95 L 452,95"/>
  </circle>
  <circle class="conn-dot" data-conn="c-result" r="2.5" fill="#3d7eff">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 452,109 L 407,109"/>
  </circle>
  <circle class="conn-dot" data-conn="c-pipe" r="2.5" fill="#10b981">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto" path="M 332,128 L 332,378"/>
  </circle>
  <circle class="conn-dot" data-conn="c-store" r="2.5" fill="#a78bfa">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 784,423 L 800,423"/>
  </circle>
  <circle class="conn-dot" data-conn="c-pdf" r="2.5" fill="#a78bfa">
    <animateMotion dur="1s" repeatCount="indefinite" rotate="auto" path="M 955,390 L 970,390"/>
  </circle>
  <circle class="conn-dot" data-conn="c-email" r="2.5" fill="#a78bfa">
    <animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto" path="M 1035,402 L 1035,430"/>
  </circle>
  <circle class="conn-dot" data-conn="c-return" r="2" fill="#3d7eff">
    <animateMotion dur="3.5s" repeatCount="indefinite" rotate="auto" path="M 877,468 L 877,560 L 109,560 L 109,128"/>
  </circle>
  <circle class="conn-dot" data-conn="c-secrets" r="2" fill="#d4a017">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto" path="M 232,277 L 220,277 L 220,100 L 232,100"/>
  </circle>

  <!-- ═══ NODES ═══ -->

  <!-- Next.js -->
  <g id="node-client" class="node" style="cursor:pointer">
    <rect x="28" y="76" width="162" height="52" rx="8" fill="#0a1929" stroke="rgba(61,126,255,0.52)" stroke-width="1.8"/>
    <text x="109" y="98"  text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13">Next.js</text>

  </g>

  <!-- Clerk Auth -->
  <g id="node-clerk" class="node" style="cursor:pointer">

    <text x="109" y="197" text-anchor="middle" fill="#2dd4bf" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Clerk Auth</text>
    <text x="109" y="213" text-anchor="middle" fill="#4fb5a8" font-family="'IBM Plex Mono',monospace" font-size="9.5">JWT · org scoping</text>

  <!-- Run Config -->
  <g id="node-config" class="node" style="cursor:pointer">

    <text x="109" y="267" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Run Config</text>
    <text x="109" y="282" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">persona · industry</text>
    <text x="109" y="295" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">constraints · models</text>

  <!-- Recommend (premium) annotation -->
  <rect x="28" y="314" width="162" height="28" rx="5" fill="rgba(10,16,36,0.92)" stroke="rgba(245,158,11,0.30)" stroke-width="1"/>
  <text x="109" y="326" text-anchor="middle" fill="#f59e0b" font-family="'IBM Plex Mono',monospace" font-size="8">recommend_combination</text>
  <text x="109" y="337" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="7.5">premium · ↺ ×3 · exact-match</text>

  <!-- FastAPI App Runner -->
  <g id="node-fastapi" class="node" style="cursor:pointer">
    <rect x="232" y="76" width="175" height="52" rx="8" fill="#160a3e" stroke="rgba(139,92,246,0.56)" stroke-width="1.8"/>
    <text x="319" y="98"  text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13">FastAPI</text>
    <text x="319" y="115" text-anchor="middle" fill="#9b77e8" font-family="'IBM Plex Mono',monospace" font-size="9.5">AWS App Runner</text>
  </g>

  <!-- LLM Router CONTAINER -->
  <g id="node-llmrouter" class="node" style="cursor:pointer">
    <rect x="452" y="60" width="368" height="218" rx="10" fill="#0d1529" stroke="rgba(61,126,255,0.30)" stroke-width="1.8"/>
    <text x="636" y="82"  text-anchor="middle" fill="#3d7eff" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11">LLM ROUTER</text>
    <text x="636" y="96"  text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">asyncio.gather · parallel fan-out · up to 5 configs</text>
  </g>

  <!-- OpenAI -->
  <g id="node-openai" class="node" style="cursor:pointer">
    <rect x="464" y="104" width="158" height="52" rx="7" fill="#091420" stroke="rgba(61,126,255,0.28)" stroke-width="1.5"/>
    <text x="543" y="126" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="12">OpenAI</text>
    <text x="543" y="143" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="9">primary → fallback</text>
  </g>

  <!-- Gemini -->
  <g id="node-gemini" class="node" style="cursor:pointer">
    <rect x="646" y="104" width="158" height="52" rx="7" fill="#091420" stroke="rgba(61,126,255,0.28)" stroke-width="1.5"/>
    <text x="725" y="126" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="12">Gemini</text>
    <text x="725" y="143" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="9">primary → fallback</text>
  </g>

  <!-- DeepSeek -->
  <g id="node-deepseek" class="node" style="cursor:pointer">
    <rect x="464" y="170" width="158" height="52" rx="7" fill="#091420" stroke="rgba(61,126,255,0.28)" stroke-width="1.5"/>
    <text x="543" y="192" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="12">DeepSeek</text>
    <text x="543" y="209" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="9">primary → fallback</text>
  </g>

  <!-- Grok -->

    <rect x="646" y="170" width="158" height="52" rx="7" fill="#091420" stroke="rgba(61,126,255,0.28)" stroke-width="1.5"/>
    <text x="725" y="192" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="12">Grok</text>
    <text x="725" y="209" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="9">primary → fallback</text>
  </g>

  <!-- LLM Router retry annotation (inside container bounds x:452–820, y:60–278) -->
  <rect x="464" y="232" width="354" height="22" rx="4" fill="rgba(8,14,32,0.92)" stroke="rgba(245,158,11,0.28)" stroke-width="1"/>
  <text x="641" y="247" text-anchor="middle" fill="#f59e0b" font-family="'IBM Plex Mono',monospace" font-size="8.5">↺ ×3 · validate output → correction prompt → retry → safe fallback</text>

  <!-- Agent Pipeline CONTAINER (stages nested as <g> so highlighted > rect targets only container bg) -->
  <g id="node-pipeline" class="node" style="cursor:pointer">
    <rect x="28" y="378" width="756" height="90" rx="10" fill="#051912" stroke="rgba(16,185,129,0.32)" stroke-width="1.8"/>
    <text x="406" y="396" text-anchor="middle" fill="#10b981" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="10">AGENT PIPELINE · schema-validated at each stage</text>
    <!-- Stage 1: Idea Gen -->
    <g><rect x="38"  y="404" width="132" height="48" rx="6" fill="#061a12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="104" y="424" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Idea Gen</text>
    <text x="104" y="440" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">generation <tspan fill="#f59e0b">↺ ×3</tspan></text></g>
    <text x="183" y="433" text-anchor="middle" fill="#3d7eff" font-family="'Space Grotesk',sans-serif" font-size="15">›</text>
    <!-- Stage 2: Rank -->
    <g><rect x="195" y="404" width="120" height="48" rx="6" fill="#061a12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="255" y="424" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Rank</text>
    <text x="255" y="440" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">score <tspan fill="#f59e0b">↺ ×2</tspan></text></g>
    <text x="327" y="433" text-anchor="middle" fill="#3d7eff" font-family="'Space Grotesk',sans-serif" font-size="15">›</text>
    <!-- Stage 3: Compare -->
    <g><rect x="339" y="404" width="120" height="48" rx="6" fill="#061a12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="399" y="424" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Compare</text>
    <text x="399" y="440" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">compare <tspan fill="#f59e0b">↺ ×2</tspan></text></g>
    <text x="471" y="433" text-anchor="middle" fill="#3d7eff" font-family="'Space Grotesk',sans-serif" font-size="15">›</text>
    <!-- Stage 4: Decision -->
    <g><rect x="483" y="404" width="130" height="48" rx="6" fill="#061a12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="548" y="424" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Decision</text>
    <text x="548" y="440" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">report <tspan fill="#f59e0b">↺ ×2</tspan></text></g>
    <text x="625" y="433" text-anchor="middle" fill="#3d7eff" font-family="'Space Grotesk',sans-serif" font-size="15">›</text>
    <!-- Stage 5: Exec Plan -->
    <g><rect x="637" y="404" width="132" height="48" rx="6" fill="#061a12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="703" y="424" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Exec Plan</text>
    <text x="703" y="440" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8.5">plan <tspan fill="#f59e0b">↺ ×3</tspan></text></g>

<div id="tooltip"></div>

<script>
const tooltips = {
  'node-client':    { title: 'Next.js Frontend',    body: 'Static export built into the Docker image and served by FastAPI from the same App Runner container. Adaptive UI: guided flow mode (step-by-step) and status flow mode (real-time progress). localStorage recovery on reload.' },
  'node-clerk':     { title: 'Clerk Auth',           body: 'JWT verified on every API request. All artifact queries scoped to the verified user ID — no cross-user visibility. Organization-level artifact isolation.' },
  'node-config':    { title: 'Run Config',           body: 'User-defined generation inputs: persona (shapes system prompt), industry, and constraints (shapes user prompt). Also selects which LLM providers to run. Premium: recommend_combination_agent (↺ ×3) recommends a persona + constraint pair from allowed lists using exact-string selection semantics.' },
  'node-fastapi':   { title: 'FastAPI · App Runner', body: 'Orchestration layer: builds prompts from persona + industry + constraints, resolves model labels to provider chains, multi-model fan-out, Pydantic validation, deterministic financial computation, PDF generation, email delivery.' },
  'node-llmrouter': { title: 'LLM Router',           body: 'User selects which providers to run. All selected models are called in parallel via asyncio.gather (up to 5). Each slot has its own per-provider model chain — if the primary model of that provider fails, it falls back to a lesser model from the same provider.' },
  'node-openai':    { title: 'OpenAI',               body: 'Called in parallel with other selected providers. Has its own internal fallback: primary OpenAI model → lesser OpenAI model on failure. Same Pydantic contract enforced on output.' },
  'node-gemini':    { title: 'Gemini',               body: 'Called in parallel. Internal fallback within Gemini: on 429 or resource exhaustion, falls back to a lesser Gemini model. Same Pydantic contract enforced.' },
  'node-deepseek':  { title: 'DeepSeek',             body: 'Called in parallel. Internal model fallback chain within DeepSeek only. Same Pydantic contract enforced. Provider identity recorded in artifact metadata.' },
  'node-grok':      { title: 'Grok',                 body: 'Called in parallel. Internal model fallback chain within Grok only. Same Pydantic contract enforced. If all retries exhausted, a deterministic safe payload is returned.' },
  'node-pipeline':  { title: 'Agent Pipeline',       body: 'Five sequential stages: Idea Gen → Rank → Compare → Decision → Exec Plan. Schema-validated at each stage. Execution Plan computes financials deterministically — LLM contributes narrative framing only, never numbers. Go / Conditional / No-Go gate is a computed threshold check, not a prompt suggestion.' },
  'node-postgres':  { title: 'PostgreSQL RDS',       body: 'All artifacts persisted: runs, comparisons, decision summaries, execution plans. Lifecycle: draft → finalized → archived. Full provenance chain back to ideation inputs — every projection re-derivable from stored formula inputs. Alembic migrations on startup.' },
  'node-weasyprint':{ title: 'WeasyPrint PDF',       body: 'Server-side HTML→PDF rendering. Structured templates from verified artifact data — consistent formatting independent of LLM output variance.' },
  'node-resend':    { title: 'Resend Email',         body: 'Verified-send pattern: server confirms receipt before recording delivery success in artifact lifecycle state. Failed sends surface as artifact errors, not silently dropped.' },
  'node-secrets':   { title: 'AWS Secrets Manager',  body: 'Runtime secrets storage: LLM provider API keys (OpenAI, Gemini, DeepSeek, Grok), PostgreSQL credentials, Clerk JWT secret, and Resend API key. Injected into the App Runner container at startup — no secrets in source control or environment files.' },
};

const connMap = {
  'node-client':    ['c-req','c-resp','c-return'],
  'node-clerk':     ['c-auth'],
  'node-config':    ['c-config'],
  'node-fastapi':   ['c-req','c-resp','c-auth','c-config','c-route','c-result','c-pipe','c-secrets'],
  'node-llmrouter': ['c-route','c-result'],
  'node-openai':    ['c-route','c-result'],
  'node-gemini':    ['c-route','c-result'],
  'node-deepseek':  ['c-route','c-result'],
  'node-grok':      ['c-route','c-result'],
  'node-pipeline':  ['c-pipe','c-store'],
  'node-postgres':  ['c-store','c-pdf','c-return'],
  'node-weasyprint':['c-pdf','c-email'],
  'node-resend':    ['c-email'],
  'node-secrets':   ['c-secrets'],
};

const allNodes = Object.keys(connMap);
const allConns = ['c-req','c-resp','c-auth','c-config','c-route','c-result','c-pipe','c-store','c-pdf','c-email','c-return','c-secrets'];
const tip = document.getElementById('tooltip');

function showTip(e, id) {
  const d = tooltips[id]; if (!d) return;
  tip.innerHTML = `<b>${d.title}</b>${d.body}`;
  tip.classList.add('vis'); moveTip(e);
}
function moveTip(e) {
  const x = e.clientX + 14, y = e.clientY - 10;
  tip.style.left = Math.min(x, window.innerWidth  - tip.offsetWidth  - 10) + 'px';
  tip.style.top  = Math.max(0, Math.min(y, window.innerHeight - tip.offsetHeight - 10)) + 'px';
}
function hideTip() { tip.classList.remove('vis'); }

function hl(nodeId) {
  const active = new Set(connMap[nodeId] || []);
  allNodes.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    if (id === nodeId) { el.classList.add('highlighted'); el.classList.remove('faded'); }
    else {
      const linked = (connMap[id] || []).some(c => active.has(c));
      el.classList.toggle('faded', !linked);
      if (linked) el.classList.remove('highlighted');
    }
  });
  allConns.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    const faded = !active.has(id);
    el.classList.toggle('faded', faded);
    document.querySelectorAll(`.conn-dot[data-conn="${id}"]`).forEach(d => d.classList.toggle('faded', faded));
  });
}

function reset() {
  [...allNodes, ...allConns].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('faded','highlighted');
  });
  document.querySelectorAll('.conn-dot').forEach(d => d.classList.remove('faded'));
  hideTip();
}

allNodes.forEach(id => {
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('mouseenter', e => { hl(id); showTip(e, id); });
  el.addEventListener('mousemove', moveTip);
  el.addEventListener('mouseleave', reset);
});

var isFs = new URLSearchParams(window.location.search).has('fs');
var fsBtn = document.querySelector('.fs-btn');
if (isFs) {
  fsBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg> Close';
}
function toggleFullscreen() {
  if (isFs) {
    window.parent.postMessage({ type: 'diagram-fullscreen-close' }, '*');
  } else if (window.parent !== window) {
    window.parent.postMessage({ type: 'diagram-fullscreen' }, '*');
  }
}
</script>
