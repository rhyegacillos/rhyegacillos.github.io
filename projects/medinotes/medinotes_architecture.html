<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediNotes — Architecture Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050d1c; overflow: hidden; }
    .wrap { display: flex; flex-direction: column; height: 100%; }
    .legend {
      display: flex; gap: 18px; flex-wrap: nowrap; align-items: center; flex-shrink: 0;
      padding: 6px 14px;
      background: rgba(13,30,56,0.88); border: 1px solid rgba(149,175,219,0.15);
      border-radius: 5px; margin: 4px 4px 0;
    }
    .legend-hint {
      text-align: right; margin: 3px 8px 0; font-size: 9px;
      color: #475569; font-family: 'IBM Plex Mono', monospace;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 9px; color: #8fa3c0; font-family: 'IBM Plex Mono', monospace; }
    .legend .fs-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      background: transparent; border: 1px solid rgba(149,175,219,0.25);
      color: #8fa3c0; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 3px 10px; border-radius: 5px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    .legend .fs-btn:hover { border-color: #3d7eff; color: #3d7eff; }
    .legend .fs-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }
    svg { width: 100%; flex: 1; min-height: 0; }
    .node, .conn { transition: opacity 0.18s; }
    .node > rect { transition: fill 0.18s, stroke 0.18s; }
    .faded { opacity: 0.12 !important; }
    .highlighted > rect:first-child { fill: #162b52 !important; stroke-opacity: 1 !important; stroke-width: 2.4px !important; }
    .conn-dot { opacity: 0.55; transition: opacity 0.18s; pointer-events: none; }
    .conn-dot.faded { opacity: 0 !important; }
    .conn-dot.highlighted { opacity: 1 !important; }
    #tooltip {
      position: absolute;
      background: rgba(5,13,28,0.96);
      border: 1px solid rgba(149,175,219,0.28);
      border-radius: 7px;
      padding: 9px 13px;
      color: #e2eaf8;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      line-height: 1.55;
      max-width: 270px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    #tooltip.vis { opacity: 1; }
    #tooltip b { color: #3d7eff; display: block; margin-bottom: 3px; font-size: 12.5px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="legend">
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#10b981" stroke-width="1.8" marker-end="url(#leg-green)"/></svg>
      Pipeline orchestration
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#3d7eff" stroke-width="1.8" marker-end="url(#leg-blue)"/></svg>
      REST · SSE request
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-teal)"/></svg>
      SSE stream · events
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-blue)"/></svg>
      Job state · Redis
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#leg-purple)"/></svg>
      Storage · RAG
    </div>
    <div class="legend-item">
      <svg width="26" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#leg-gray)"/></svg>
      External · conditional
    </div>
    <button class="fs-btn" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      Fullscreen
    </button>
  </div>
  <div class="legend-hint">Hover nodes to highlight paths</div>
<svg style="position:absolute;width:0;height:0">
  <defs>
    <marker id="leg-blue"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#3d7eff"/></marker>
    <marker id="leg-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#10b981"/></marker>
    <marker id="leg-teal"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#2dd4bf"/></marker>
    <marker id="leg-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#a78bfa"/></marker>
    <marker id="leg-gray"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 Z" fill="#6b7280"/></marker>
  </defs>
</svg>
<!--
  viewBox 1458×680  |  30px inter-column gaps
  CLIENT x=18–200 (w=182) | FASTAPI x=230–482 (w=252)
  PIPELINE x=512–944 (w=432) | STORAGE x=974–1440 (w=466)
  Vertical: nodes span y=76–614, equal gaps per zone
-->
<svg viewBox="0 0 1274 680" preserveAspectRatio="xMidYMid meet" role="img" aria-label="MediNotes Architecture Diagram">
  <defs>
    <marker id="arr-blue"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#3d7eff"/></marker>
    <marker id="arr-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#10b981"/></marker>
    <marker id="arr-teal"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#2dd4bf"/></marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#a78bfa"/></marker>
    <marker id="arr-amber"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#f59e0b"/></marker>
    <marker id="arr-gray"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 Z" fill="#6b7280"/></marker>
  </defs>


  <!-- ═══ ZONE BACKGROUNDS ═══ -->
  <rect x="18"  y="46" width="182" height="578" rx="4" fill="rgba(13,40,90,0.14)"/>
  <rect x="230" y="46" width="252" height="578" rx="4" fill="rgba(60,20,100,0.10)"/>
  <rect x="512" y="46" width="432" height="578" rx="4" fill="rgba(5,25,15,0.10)"/>
  <rect x="974" y="46" width="282" height="578" rx="4" fill="rgba(5,20,40,0.08)"/>

  <!-- ═══ CONNECTIONS ═══ -->

  <!-- c-req: Next.js → FastAPI -->
  <path id="c-req"   class="conn" d="M 190,108 L 230,108" stroke="#3d7eff" stroke-width="1.8" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-sse: FastAPI → Next.js (SSE events) -->
  <path id="c-sse"   class="conn" d="M 230,128 L 190,128" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-teal)"/>
  <!-- c-run: FastAPI → Extraction Agent -->
  <path id="c-run"   class="conn" d="M 472,122 L 512,122" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-redis: FastAPI → Upstash Redis (over-top y=48) -->
  <path id="c-redis" class="conn" d="M 356,76 L 356,48 L 959,48 L 959,242 L 984,242" stroke="#3d7eff" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-blue)"/>
  <!-- c-brave: Research Agent → Brave Search (zone gap x=959) -->
  <path id="c-brave" class="conn" d="M 924,328 L 959,328 L 959,427 L 984,427" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-gray)"/>
  <!-- c-mem: Memory Agent → DynamoDB (bottom routing y=618) -->
  <path id="c-mem"   class="conn" d="M 724,496 L 724,618 L 959,618 L 959,131 L 984,131" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- c-email: Email Agent → Resend -->
  <path id="c-email" class="conn" d="M 924,577 L 959,577 L 959,331 L 984,331" stroke="#2dd4bf" stroke-width="1.6" fill="none" marker-end="url(#arr-teal)"/>
  <!-- c-sres: Summary → Research (internal conditional) -->
  <path id="c-sres"  class="conn" d="M 858,266 L 858,284" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arr-amber)"/>
  <!-- c-extract: Extraction Agent → Summary Agent (core pipeline handoff) -->
  <path id="c-extract" class="conn" d="M 728,156 L 728,174" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-crit: Summary Agent → Critic Agent (QA gate) -->
  <path id="c-crit" class="conn" d="M 657,266 L 657,284" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-regen: Critic → Summary regen feedback (conditional loop up left side) -->
  <path id="c-regen" class="conn" d="M 532,328 L 515,328 L 515,220 L 532,220" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-amber)"/>
  <!-- c-evid-flow: post-Critic → Evidence Agent (parallel fanout) -->
  <path id="c-evid-flow" class="conn" d="M 592,410 L 592,428" stroke="#10b981" stroke-width="1.4" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-mem-flow: post-Critic → Memory Agent (parallel fanout) -->
  <path id="c-mem-flow" class="conn" d="M 724,410 L 724,428" stroke="#10b981" stroke-width="1.4" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-coord-flow: post-Critic → Coordinator (parallel fanout) -->
  <path id="c-coord-flow" class="conn" d="M 860,410 L 860,428" stroke="#10b981" stroke-width="1.4" fill="none" marker-end="url(#arr-green)"/>
  <!-- c-rag-ret: DynamoDB → Summary Agent (RAG retrieval, longitudinal memory) -->
  <path id="c-rag-ret" class="conn" d="M 984,76 L 984,44 L 728,44 L 728,174" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-purple)"/>
  <!-- c-clerk: Clerk → FastAPI (JWT auth verification) -->
  <path id="c-clerk" class="conn" d="M 190,248 L 210,248 L 210,192 L 240,192" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-purple)"/>

  <!-- ═══ FLOW ANIMATION DOTS ═══ -->
  <!-- Dots travel along each path to visualise data flow direction -->
  <circle class="conn-dot" data-conn="c-req" r="3" fill="#3d7eff">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s"><mpath href="#c-req"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-sse" r="3" fill="#2dd4bf">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.5s"><mpath href="#c-sse"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-run" r="3" fill="#10b981">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.9s"><mpath href="#c-run"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-clerk" r="2.5" fill="#a78bfa">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.3s"><mpath href="#c-clerk"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-redis" r="2.5" fill="#3d7eff">
    <animateMotion dur="3.6s" repeatCount="indefinite" begin="0s"><mpath href="#c-redis"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-extract" r="2.5" fill="#10b981">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0s"><mpath href="#c-extract"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-crit" r="2.5" fill="#10b981">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.5s"><mpath href="#c-crit"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-sres" r="2.5" fill="#f59e0b">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.2s"><mpath href="#c-sres"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-regen" r="2.5" fill="#f59e0b">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0s"><mpath href="#c-regen"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-evid-flow" r="2.5" fill="#10b981">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0s"><mpath href="#c-evid-flow"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-mem-flow" r="2.5" fill="#10b981">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.4s"><mpath href="#c-mem-flow"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-coord-flow" r="2.5" fill="#10b981">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.8s"><mpath href="#c-coord-flow"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-brave" r="2.5" fill="#6b7280">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0s"><mpath href="#c-brave"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-mem" r="2.5" fill="#a78bfa">
    <animateMotion dur="3.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#c-mem"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-email" r="2.5" fill="#2dd4bf">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.4s"><mpath href="#c-email"/></animateMotion>
  </circle>
  <circle class="conn-dot" data-conn="c-rag-ret" r="2.5" fill="#a78bfa">
    <animateMotion dur="3.0s" repeatCount="indefinite" begin="1.2s"><mpath href="#c-rag-ret"/></animateMotion>
  </circle>

  <!-- ═══ NODES ═══ -->

  <!-- ── CLIENT ZONE ── -->
  <!-- 5 nodes, total h=466, 4 gaps of 18px, y=76→614 -->

  <!-- Next.js (y=76, h=114) -->
  <g id="node-client" class="node" style="cursor:pointer">
    <rect x="28" y="76" width="162" height="114" rx="8" fill="#0a1929" stroke="rgba(61,126,255,0.52)" stroke-width="1.8"/>
    <text x="109" y="96"  text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13">Next.js</text>
    <text x="109" y="111" text-anchor="middle" fill="#5b8dd9" font-family="'IBM Plex Mono',monospace" font-size="9">SSE · evidence panel</text>
    <text x="109" y="124" text-anchor="middle" fill="#5b8dd9" font-family="'IBM Plex Mono',monospace" font-size="8.5">patient history · chat</text>
    <text x="109" y="137" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">incremental stage render</text>
    <text x="109" y="150" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">reconnect via job_id</text>
    <text x="109" y="163" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">no re-execution on rejoin</text>
    <text x="109" y="176" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">evidence claim inspector</text>
  </g>

  <!-- Clerk (y=208, h=80, gap=18) -->
  <g id="node-clerk" class="node" style="cursor:pointer">
    <rect x="28" y="208" width="162" height="80" rx="7" fill="#1a0a2e" stroke="rgba(167,139,250,0.44)" stroke-width="1.8"/>
    <text x="109" y="226" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11.5">Clerk</text>
    <text x="109" y="240" text-anchor="middle" fill="#9b77e8" font-family="'IBM Plex Mono',monospace" font-size="8.5">auth · org scoping</text>
    <text x="109" y="253" text-anchor="middle" fill="#9b77e8" font-family="'IBM Plex Mono',monospace" font-size="8.5">JWT issued to client</text>
    <text x="109" y="266" text-anchor="middle" fill="#7e5cc4" font-family="'IBM Plex Mono',monospace" font-size="8">JWTs verified per request</text>
    <text x="109" y="279" text-anchor="middle" fill="#7e5cc4" font-family="'IBM Plex Mono',monospace" font-size="8">data scoped to user ID</text>
  </g>

  <!-- SSE Stage Events (y=306, h=96, gap=18) -->
  <g id="node-sseevents" class="node" style="cursor:pointer">
    <rect x="28" y="306" width="162" height="96" rx="7" fill="#071e1a" stroke="rgba(45,212,191,0.32)" stroke-width="1.6"/>
    <text x="109" y="324" text-anchor="middle" fill="#2dd4bf" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="10.5">SSE Stage Events</text>
    <text x="109" y="338" text-anchor="middle" fill="#4fb5a8" font-family="'IBM Plex Mono',monospace" font-size="9">extraction_complete</text>
    <text x="109" y="351" text-anchor="middle" fill="#4fb5a8" font-family="'IBM Plex Mono',monospace" font-size="9">summary_draft_ready</text>
    <text x="109" y="364" text-anchor="middle" fill="#4fb5a8" font-family="'IBM Plex Mono',monospace" font-size="9">critic_pass_complete</text>
    <text x="109" y="377" text-anchor="middle" fill="#4fb5a8" font-family="'IBM Plex Mono',monospace" font-size="9">evidence_linked</text>
    <text x="109" y="390" text-anchor="middle" fill="#6b7280" font-family="'IBM Plex Mono',monospace" font-size="8">memory_indexed · error</text>
  </g>

  <!-- Consultation History (y=420, h=96, gap=18) -->
  <g id="node-history" class="node" style="cursor:pointer">
    <rect x="28" y="420" width="162" height="96" rx="7" fill="#0a1929" stroke="rgba(61,126,255,0.38)" stroke-width="1.6"/>
    <text x="109" y="438" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11">Consultation History</text>
    <text x="109" y="452" text-anchor="middle" fill="#5b8dd9" font-family="'IBM Plex Mono',monospace" font-size="8.5">paginated past visits</text>
    <text x="109" y="465" text-anchor="middle" fill="#5b8dd9" font-family="'IBM Plex Mono',monospace" font-size="8.5">filter: patient · date</text>
    <text x="109" y="478" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">soft delete · restore entries</text>
    <text x="109" y="491" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">rename · manage patients</text>
    <text x="109" y="504" text-anchor="middle" fill="#6b7280" font-family="'IBM Plex Mono',monospace" font-size="8">GET /api/patients</text>
  </g>

  <!-- Consultation Form (y=534, h=80, gap=18) → bottom=614 -->
  <g id="node-inputpanel" class="node" style="cursor:pointer">
    <rect x="28" y="534" width="162" height="80" rx="7" fill="#0a1929" stroke="rgba(61,126,255,0.28)" stroke-width="1.4"/>
    <text x="109" y="551" text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="11">Consultation Form</text>
    <text x="109" y="565" text-anchor="middle" fill="#5b8dd9" font-family="'IBM Plex Mono',monospace" font-size="8.5">PDF · audio · image · text</text>
    <text x="109" y="578" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">language: source → target</text>
    <text x="109" y="591" text-anchor="middle" fill="#8fa3c0" font-family="'IBM Plex Mono',monospace" font-size="8">submit → /api/consultation</text>
    <text x="109" y="604" text-anchor="middle" fill="#6b7280" font-family="'IBM Plex Mono',monospace" font-size="8">Whisper preview on upload</text>
  </g>

  <!-- ── FASTAPI ZONE (x=230–482, nodes x=240 w=232 center=356) ── -->
  <!-- 5 nodes, total h=428, 4 gaps of 27px, y=76→612 -->

  <!-- FastAPI (y=76, h=124) -->
  <g id="node-fastapi" class="node" style="cursor:pointer">
    <rect x="240" y="76" width="232" height="124" rx="8" fill="#160a3e" stroke="rgba(139,92,246,0.56)" stroke-width="1.8"/>
    <text x="356" y="96"  text-anchor="middle" fill="#e2eaf8" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13">FastAPI</text>

  'node-client':      { title: 'Next.js Client', body: 'Consumes incremental SSE events from the pipeline. Evidence panel lets clinicians expand any claim to see the exact source excerpt. Reconnects via job_id after any disconnect — no re-execution, picks up from last completed stage.' },
  'node-clerk':       { title: 'Clerk Authentication', body: 'Issues JWTs to the client. FastAPI verifies the JWT on every API request via JWKS. All patient data queries scoped to the verified user ID — cross-patient access is architecturally impossible at the query layer.' },
  'node-sseevents':   { title: 'SSE Stage Events', body: 'Each pipeline stage emits an SSE event on completion: extraction_complete, summary_draft_ready, critic_pass_complete, evidence_linked, memory_indexed. Critic failure emits critic_regenerating so the client knows why the pipeline is taking longer.' },
  'node-fastapi':     { title: 'FastAPI · AWS App Runner', body: 'Single-container deployment (Next.js static export + FastAPI). Orchestrates the full pipeline as a resumable SSE job. Verifies Clerk JWTs per request. App Runner handles auto HTTPS, health checks, and request-based scaling.' },
  'node-ssejobs':     { title: 'Resumable SSE Jobs', body: 'Job state persisted in Upstash Redis keyed by job_id with per-stage completion flags. Client reconnects with the job_id and resumes from the exact last completed stage — not from the beginning. No re-execution cost.' },
  'node-guardrails':  { title: 'Persistent Format Guardrails', body: 'Critic issues are counted per doctor profile. When a violation pattern reaches the repeat threshold, an LLM rewrites it as a neutral format rule (max 8 guardrails). Future generation prompts inject these as negative constraints — output quality improves without manual prompt tuning.' },
  'node-routing':     { title: 'Model Routing + Fallback', body: 'Summary Agent uses deepseek-chat via DeepSeek API when configured; falls back to gpt-4o-mini. Critic uses gemini-2.5-flash (gemini-2.5-flash-lite fallback). Chat uses same Gemini chain. Extraction uses gpt-4o-mini for vision OCR, whisper-1 for audio.' },
  'node-pipeline':    { title: 'Agent Pipeline · Hub-and-Spoke', body: 'Summary Agent orchestrates all specialist agents with deterministic handoffs — not open-ended loops. Each agent has a single bounded responsibility. A Critic failure triggers targeted regeneration, not a full pipeline restart.' },
  'node-extraction':  { title: 'Extraction Agent', body: 'Multimodal input normalization. PDF/DOCX/TXT/MD to text, audio via Whisper (whisper-1), prescription images via vision model OCR and English translation. All inputs normalized to uniform text context before any summarization occurs.' },
  'node-summary':     { title: 'Summary Agent — Orchestration Hub', body: 'Builds unified visit context from all extracted inputs and research evidence. Generates strict 3-section HTML: chief complaint, clinical findings, treatment plan. Conditionally enables tool calls when medication/condition heuristics fire. Coordinates all downstream handoffs.' },
  'node-critic':      { title: 'Critic Agent · QA Gate · Gemini', body: 'Evaluates every summary before delivery: factual contradictions, clinical omissions, hallucinated specifics, structural violations. Fail → tournament regeneration (N=3 parallel candidates, each re-reviewed, best selected). Issues recorded as guardrails. Returns JSON: score, issues, missing, hallucinations.' },
  'node-research':    { title: 'Research Agent · Conditional', body: 'Only triggered when medication/condition heuristics detect signals needing external verification. Queries Brave Search via MCPServerStdio. Results injected as clearly marked referenced evidence into Summary Agent — not as direct clinical claims.' },
  'node-evidence':    { title: 'Evidence Agent · Source Mapping', body: 'Maps every summary statement to its specific source chunk. Clinician can expand any claim to see the exact input excerpt. Unsupported statements flagged as evidence gaps. Snippets capped at 140 chars. Evidence map persisted and emitted as SSE event.' },
  'node-memory':      { title: 'Memory Agent · RAG', body: 'After each visit, the finalized summary is embedded and stored in DynamoDB keyed by patient ID. On subsequent visits, semantically similar prior summaries are retrieved via cosine similarity and injected as longitudinal background context. Dedup by patient+date+encounter_id.' },
  'node-coordinator': { title: 'Coordinator Agent', body: 'Extracts next-step actions from the finalized summary: follow-ups, referrals, medication changes, pending tests. Emitted as the actions SSE event. Runs in parallel with Evidence and Memory agents after Critic approval.' },
  'node-chat':        { title: 'Chat Agent · Gemini', body: 'Patient-scoped clinical Q&A. Grounded only in current patient\'s summaries and consultation context via DynamoDB RAG recall. Cannot speculate beyond documented evidence. App guide injected for product support questions. Streams Markdown.' },
  'node-emailagent':  { title: 'Email Agent', body: 'Triggered by clinician to dispatch patient summaries. Optionally translates to patient\'s language before sending. Sends via Resend with verified-send pattern: delivery receipt confirmed before recording delivery_success. Failed sends surface as delivery errors.' },
  'node-vecstore':    { title: 'DynamoDB · Patient Memory Store', body: 'Durable patient-memory store with embeddings via text-embedding-3-small. Stores visit_summary, visit_notes, visit_evidence per encounter. Cosine similarity ranking in application code. Dedup by (patient, date, type, template_id, encounter_id). Cross-patient retrieval blocked at the query layer.' },
  'node-redis':       { title: 'Upstash Redis · Job State', body: 'Resumable SSE job state. Each job stored as a Redis hash with per-stage completion flags. HTTP-based access — no persistent TCP connections, compatible with App Runner. Optional — falls back to in-memory jobs if not configured.' },
  'node-resend':      { title: 'Resend · Email Delivery', body: 'Email dispatch for summaries and patient reports. Verified-send: server confirms delivery receipt from Resend API before recording delivery_success in job state. Failed sends surface as state errors — not silent failures.' },
  'node-brave':       { title: 'Brave Search MCP · stdio', body: 'External clinical lookup via MCPServerStdio from OpenAI Agents SDK. Triggered by medication/condition heuristics in the Summary Agent. Provides drug interaction data and clinical guidelines. Research Agent owns the MCP boundary — Summary Agent never calls external tools directly.' },
  'node-history':     { title: 'Consultation History', body: 'Browse and manage patient visit history. Paginated list scoped to the authenticated clinician. Filter by patient name. Supports soft delete and restore of individual visit entries. Patient records can be renamed across all stored artifacts.' },
  'node-inputpanel':  { title: 'Consultation Form', body: 'Multi-input assembly before submission. Accepts PDF documents, audio recordings (Whisper transcription preview on upload), prescription images (vision OCR), and freeform text notes. Target language for patient email translation selected here. Submits as POST /api/consultation, which opens an SSE stream keyed by job_id.' },
  'node-histapi':     { title: 'Patient History API', body: 'REST endpoints for patient history management. GET /api/patients returns a paginated patient list. GET /api/patient-history retrieves visit history for one patient. POST /api/patient/rename renames all stored records. POST /api/patient/delete-entry soft-deletes a visit artifact. POST /api/patient/restore-entry restores a soft-deleted artifact. All endpoints JWT-gated.' },
  'node-secrets':     { title: 'AWS Secrets Manager', body: 'Stores deployed runtime secrets — model API keys, Clerk keys, Resend API key, Brave API key. Terraform creates secret shells; deploy script synchronizes actual values. App Runner resolves ARNs at container startup. Keeps real secret values out of Terraform state while making the deployed service reproducible.' },
};

const connMap = {
  'node-client':      ['c-req','c-sse'],
  'node-clerk':       ['c-req','c-clerk'],
  'node-sseevents':   ['c-sse'],
  'node-fastapi':     ['c-req','c-sse','c-run','c-redis','c-clerk'],
  'node-ssejobs':     ['c-redis','c-sse'],
  'node-guardrails':  [],
  'node-routing':     [],
  'node-pipeline':    ['c-run','c-mem','c-brave','c-email'],
  'node-extraction':  ['c-run','c-extract'],
  'node-summary':     ['c-mem','c-sres','c-extract','c-crit','c-regen','c-rag-ret'],
  'node-critic':      ['c-crit','c-regen','c-evid-flow','c-mem-flow','c-coord-flow'],
  'node-research':    ['c-brave','c-sres'],
  'node-evidence':    ['c-evid-flow'],
  'node-memory':      ['c-mem','c-mem-flow'],
  'node-coordinator': ['c-coord-flow'],
  'node-chat':        [],
  'node-emailagent':  ['c-email'],
  'node-vecstore':    ['c-mem','c-rag-ret'],
  'node-redis':       ['c-redis'],
  'node-resend':      ['c-email'],
  'node-brave':       ['c-brave'],
  'node-history':     ['c-req'],
  'node-inputpanel':  ['c-req'],
  'node-histapi':     [],
  'node-secrets':     [],
};

const allNodes = Object.keys(connMap);
const allConns = ['c-req','c-sse','c-run','c-redis','c-brave','c-mem','c-email','c-sres','c-extract','c-crit','c-regen','c-evid-flow','c-mem-flow','c-coord-flow','c-rag-ret','c-clerk'];
const tip = document.getElementById('tooltip');

function fadeAll() {
  allNodes.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('faded'); });
  allConns.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('faded'); });
  document.querySelectorAll('.conn-dot').forEach(d => d.classList.add('faded'));
}
function clearAll() {
  allNodes.forEach(id => { const el = document.getElementById(id); if (el) { el.classList.remove('faded'); el.classList.remove('highlighted'); } });
  allConns.forEach(id => { const el = document.getElementById(id); if (el) { el.classList.remove('faded'); el.classList.remove('highlighted'); } });
  document.querySelectorAll('.conn-dot').forEach(d => { d.classList.remove('faded'); d.classList.remove('highlighted'); });
}

allNodes.forEach(nodeId => {
  const el = document.getElementById(nodeId);
  if (!el) return;
  el.addEventListener('mouseenter', (e) => {
    fadeAll();
    el.classList.remove('faded');
    el.classList.add('highlighted');
    (connMap[nodeId] || []).forEach(cid => {
      const cel = document.getElementById(cid);
      if (cel) { cel.classList.remove('faded'); cel.classList.add('highlighted'); }
      document.querySelectorAll(`.conn-dot[data-conn="${cid}"]`).forEach(d => {
        d.classList.remove('faded'); d.classList.add('highlighted');
      });
      Object.keys(connMap).forEach(nid => {
        if (nid !== nodeId && connMap[nid].some(c => connMap[nodeId].includes(c))) {
          const nel = document.getElementById(nid);
          if (nel) nel.classList.remove('faded');
        }
      });
    });
    const t = tooltips[nodeId];
    if (t) {
      tip.innerHTML = `<b>${t.title}</b>${t.body}`;
      tip.classList.add('vis');
    }
  });
  el.addEventListener('mousemove', (e) => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    clearAll();
    tip.classList.remove('vis');
  });
});

var isFs = new URLSearchParams(window.location.search).has('fs');
var fsBtn = document.querySelector('.fs-btn');
if (isFs) {
  fsBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg> Close';
}
function toggleFullscreen() {
  if (isFs) {
    window.parent.postMessage({ type: 'diagram-fullscreen-close' }, '*');
  } else if (window.parent !== window) {
    window.parent.postMessage({ type: 'diagram-fullscreen' }, '*');
  }
}
</script>
</body>
</html>
