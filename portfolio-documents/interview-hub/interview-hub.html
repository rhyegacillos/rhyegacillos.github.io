      const tabsEl = document.getElementById("tabs");
      const titleEl = document.getElementById("module-title");
      const rawEl = document.getElementById("raw-link");
      const contentEl = document.getElementById("content");

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderInline(text) {
        let s = escapeHtml(text);

        s = s.replace(
          /\[([^\]]+)\]\(([^)]+)\)/g,
          (_, label, url) =>
            `<a href="${url}" target="_blank" rel="noreferrer">${label}</a>`
        );
        s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        return s;
      }

      function markdownToHtml(md) {
        const lines = md.replace(/\r/g, "").split("\n");
        let html = "";
        let paragraph = [];
        let inCode = false;
        let codeLines = [];
        let inUl = false;
        let inOl = false;

        const closeLists = () => {
          if (inUl) {
            html += "</ul>";
            inUl = false;
          }
          if (inOl) {
            html += "</ol>";
            inOl = false;
          }
        };

        const flushParagraph = () => {
          if (!paragraph.length) return;
          html += `<p>${renderInline(paragraph.join(" "))}</p>`;
          paragraph = [];
        };

        for (let i = 0; i < lines.length; i += 1) {
          const line = lines[i];
          const trimmed = line.trim();

          if (inCode) {
            if (/^```/.test(trimmed)) {
              html += `<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`;
              inCode = false;
              codeLines = [];
            } else {
              codeLines.push(line);
            }
            continue;
          }

          if (/^```/.test(trimmed)) {
            flushParagraph();
            closeLists();
            inCode = true;
            codeLines = [];
            continue;
          }

          if (!trimmed) {
            flushParagraph();
            closeLists();
            continue;
          }

          const heading = line.match(/^(#{1,6})\s+(.*)$/);
          if (heading) {
            flushParagraph();
            closeLists();
            const level = heading[1].length;
            html += `<h${level}>${renderInline(heading[2])}</h${level}>`;
            continue;
          }

          if (/^(-{3,}|\*{3,})$/.test(trimmed)) {
            flushParagraph();
            closeLists();
            html += "<hr />";
            continue;
          }

          const bq = line.match(/^>\s?(.*)$/);
          if (bq) {
            flushParagraph();
            closeLists();
            html += `<blockquote>${renderInline(bq[1])}</blockquote>`;
            continue;
          }

          const ul = line.match(/^\s*[-*]\s+(.*)$/);
          if (ul) {
            flushParagraph();
            if (inOl) {
              html += "</ol>";
              inOl = false;
            }
            if (!inUl) {
              html += "<ul>";
              inUl = true;
            }
            html += `<li>${renderInline(ul[1])}</li>`;
            continue;
          }

          const ol = line.match(/^\s*\d+\.\s+(.*)$/);
          if (ol) {
            flushParagraph();
            if (inUl) {
              html += "</ul>";
              inUl = false;
            }
            if (!inOl) {
              html += "<ol>";
              inOl = true;
            }
            html += `<li>${renderInline(ol[1])}</li>`;
            continue;
          }

          paragraph.push(trimmed);
        }

        flushParagraph();
        closeLists();
        if (inCode) {
          html += `<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`;
        }
        return html || '<p class="status">No content found.</p>';
      }

      function loadModule(module) {
        titleEl.textContent = module.title;
        rawEl.href = module.file;

        document.querySelectorAll(".tab").forEach((el) => {
          el.classList.toggle("active", el.dataset.id === module.id);
        });

        contentEl.innerHTML = markdownToHtml(module.markdown || "");
        window.location.hash = module.id;
      }

      function init() {
        modules.forEach((module) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tab";
          btn.dataset.id = module.id;
          btn.textContent = module.title;
          btn.addEventListener("click", () => loadModule(module));
          tabsEl.appendChild(btn);
        });

        const hashId = window.location.hash.replace("#", "");
        const start = modules.find((m) => m.id === hashId) || modules[0];
        loadModule(start);
      }

      init();
    </script>
