    <script id="embedded-modules" type="application/json">[{"id":"short","title":"Core Q&A (Clear Version)","file":"COMPREHENSIVE_INTERVIEW_SCENARIO_SHORT.md","markdown":"# Interview Q&A (Clear, Natural Version)\n\nThis version is still meant for faster practice, but the answers are not clipped down to one line.  \nEach answer gives you enough explanation to sound thoughtful, clear, and human in an interview.\n\n---\n\n## 1) Fast Intro\n\n### Q1) Tell me about yourself.\nA:  \n\"I build full-stack AI applications, but the part I care about most is reliability.  \nI like making sure an AI feature still behaves well when requests take too long, when a provider fails, or when a tool result does not match what the model wanted to say.  \nSo across my projects, I work on backend logic, frontend behavior, and AWS deployment, but my strongest value is making AI features safe and usable beyond demo mode.\"\n\n### Q2) What kind of role are you looking for?\nA:  \n\"I’m looking for Software Engineer or Full-Stack AI roles where I can build real products end to end.  \nI’m especially interested in work where AI is part of a bigger system and needs good engineering around it, like validation, fallback behavior, observability, and deployment.\"\n\n### Q3) What is your portfolio theme?\nA:  \n\"The common theme is controlled AI systems, not prompt-only demos.  \nAcross the projects, I keep clear boundaries around model behavior so results are checked, risky actions are verified, and failures are easier to diagnose.  \nThat is the pattern that ties the portfolio together.\"\n\n---\n\n## 2) Project One-Liners\n\n### Q4) What is Digital Assistant?\nA:  \n\"Digital Assistant is a serverless AI assistant that can do more than chat.  \nIt supports tool use like search, PDF export, email delivery, uploads, and memory approval, and it is designed so long-running work can happen safely in the background instead of timing out in one request.  \nI usually describe it as one main agent supported by an API, a worker, and tool servers.\"\n\n### Q5) What is IdeaGen?\nA:  \n\"IdeaGen is a decision workflow platform, not just an idea generator.  \nIt helps users generate options, compare results across OpenAI, Gemini, DeepSeek, and Grok, summarize what is worth pursuing, and build an execution plan that is easier to discuss with stakeholders.  \nI usually explain the architecture as one orchestrated workflow with contract-first validation, deterministic finance, and persistent artifacts on App Runner plus RDS.\"\n\n### Q6) What is Autonomous Agentic Trader?\nA:  \n\"It is a multi-agent trading simulation with four trader personas and a live control-desk interface.  \nThe important part is not just the agents themselves, but the boundaries around them, because the system routes research and execution through controlled tools instead of letting agents act freely.  \nI usually add that it also has scheduled cycles, deterministic portfolio controls, supporting review / extra review for conflicts, and an SSE-driven operator view for logs and portfolio state.\"\n\n### Q7) What is MediNotes?\nA:  \n\"MediNotes is a clinical documentation platform that turns different kinds of visit input into structured summaries.  \nWhat makes it stronger than a basic summarizer is that it reviews the draft, links important claims back to evidence, and supports resumable streaming so the output is easier to trust.  \nIt is also the most agent-heavy project in the portfolio, with eight specialized roles working in one hub-and-spoke flow.\"\n\n---\n\n## 3) Core Architecture Questions\n\n### Q8) What pattern is common in your projects?\nA:  \n\"I put a control layer around model behavior.  \nThat means I do not treat the model as the final authority.  \nI use validation, fallback paths, tool boundaries, and clear failure handling so the system stays predictable even when the model is not.\"\n\n### Q9) How do you avoid model unpredictability?\nA:  \n\"I try to reduce freedom in the places where freedom becomes risk.  \nI use output format rules, retry-with-correction, fallback behavior, and safe defaults when the answer is not reliable enough.  \nThe goal is not to make the model perfect. The goal is to stop weak output from causing bigger workflow problems.\"\n\n### Q10) When do you use async execution?\nA:  \n\"I use async execution when the work is long-running, tool-heavy, or likely to hit request time limits.  \nThat way the API can respond quickly, the job continues in the background, and the user gets clear status instead of a timeout.\"\n\n### Q11) How do you choose sync vs async?\nA:  \n\"If the operation is short and predictable, sync is usually fine.  \nIf it involves several tools, external providers, or heavy processing, async is safer because it gives the system more room to finish cleanly and gives the user a better experience.\"\n\n---\n\n## 4) Short Behavioral Answers\n\n### Q12) Tell me about a tough problem you solved.\nA:  \n\"One problem I handled was model text claiming a real action had succeeded when the tool had actually failed.  \nI fixed that by making final responses depend on verified tool results instead of model confidence.  \nThat changed the system from sounding confident to being correct.\"\n\n### Q13) Tell me about a tradeoff you made.\nA:  \n\"In some projects, I chose simpler persistence early so I could ship faster and keep the architecture easy to understand.  \nI was careful not to hide that tradeoff.  \nI documented where scale limits would appear and what the migration path should be.\"\n\n### Q14) What did you own end-to-end?\nA:  \n\"I owned architecture, backend orchestration, frontend workflows, deployment automation, and technical documentation.  \nThat mattered because it let me keep the product behavior, operational behavior, and system design aligned instead of solving each part in isolation.\"\n\n---\n\n## 5) Follow-Up Q&A (Important Terms)\n\n### Q15) What is tool orchestration?\nA:  \n\"Tool orchestration means the system decides which tools to use, in what order, and how their results are combined into one final answer.  \nWithout orchestration, tools are just disconnected actions.  \nWith orchestration, they become part of one controlled workflow.\"\n\n### Q16) Why is tool orchestration important?\nA:  \n\"It matters because real user tasks are rarely solved by one model call alone.  \nIf search, file reading, PDF generation, or email delivery all need to work together, the system needs logic for sequencing, validation, and error handling so the result feels coherent and reliable.\"\n\n### Q17) What is fallback behavior?\nA:  \n\"Fallback behavior is what the system does when the first option fails.  \nThat might mean switching to another model, using cached data, or returning a safer response instead of pretending everything is fine.\"\n\n### Q18) Why is fallback behavior important?\nA:  \n\"It keeps the app usable during provider errors, timeouts, or partial outages.  \nWithout fallback handling, one unstable dependency can break the entire workflow.  \nWith fallback handling, the system can often degrade gracefully instead of crashing.\"\n\n### Q19) What is async execution?\nA:  \n\"Async execution means long tasks continue in the background instead of keeping the user stuck inside one request.  \nUsually the API returns a job ID quickly, then the frontend checks progress until the work is done.\"\n\n### Q20) Why async instead of only sync APIs?\nA:  \n\"Because AI workflows can take longer than normal request limits, especially when they involve multiple tools.  \nAsync design gives better reliability and a clearer user experience because the system can finish the work without pretending it is instant.\"\n\n### Q21) What are quotas in your apps?\nA:  \n\"Quotas are server-side limits on usage, like tokens, PDFs, emails, or saved artifacts.  \nThey help control cost, reduce abuse, and keep the service fair across users.\"\n\n### Q22) Why use quotas?\nA:  \n\"Because AI features can become expensive quickly if there are no controls.  \nQuotas give the product a clear limit policy and make usage more predictable for both users and the system owner.\"\n\n### Q23) What is observability (logs, traces, and metrics)?\nA:  \n\"Observability means having enough information to understand what the system is doing while it runs.  \nLogs show events, traces show how one request moved through different layers, and metrics show patterns like latency, failure rate, or backlog growth.\"\n\n### Q24) Why is observability important in AI apps?\nA:  \n\"AI workflows fail in many places: model call, tool call, worker logic, API layer, or infrastructure.  \nObservability helps you stop guessing and find the real failing step faster.\"\n\n### Q25) What do you usually track first?\nA:  \n\"I usually start with latency, failure rate, fallback rate, tool success rate, and quota-limit events.  \nThose numbers tell me whether the system is stable for users, not just technically online.\"\n\n---\n\n## 6) Quick Scale-Up Answers\n\n### Q26) How would you scale these systems?\nA:  \n\"I would move long operations into workers where needed, migrate local database bottlenecks to managed Postgres, and standardize tracing across services.  \nAfter that, I would add clearer service reliability targets and alerting so scale does not just mean more traffic, it means controlled operations too.\"\n\n### Q27) What changes first for enterprise readiness?\nA:  \n\"Usually the first upgrades are stronger auth and access control, stricter policy checks, deeper evaluation coverage, and better audit logging.  \nThose are the parts that matter when more users, more data, and higher-risk workflows are involved.\"\n\n### Q27-A) How do Terraform and GitHub Actions work together in your projects?\nA:  \n\"Terraform defines the cloud infrastructure as code, so the environment is described clearly and can be recreated consistently.  \nGitHub Actions runs the release steps like build, test, push, deploy, and health checks.  \nSo Terraform defines what should exist, and GitHub Actions automates how changes are released.\"\n\n---\n\n## 7) Closing Answers\n\n### Q28) Why should we hire you?\nA:  \n\"Because I can build AI features that work under real conditions, not just happy-path demos.  \nI think carefully about correctness, reliability, and production behavior, and I’m comfortable owning the path from implementation to deployment.\"\n\n### Q29) What would you do in your first 90 days?\nA:  \n\"First I would understand the current architecture and where users or operators feel the most pain.  \nThen I would focus on the highest-impact reliability improvements and ship at least one measurable product win so the work is visible and useful early.\"\n\n### Q30) What questions do you ask interviewers?\nA:  \n\"I usually ask where their current AI or automation workflows fail most in production, how they measure quality, and what kind of engineering depth they need most right now.  \nThose questions help me understand whether the team values reliability as much as feature speed.\"\n"},{"id":"essay","title":"Full Essay Practice","file":"INTERVIEW_FULL_ESSAY_PRACTICE.md","markdown":"# Full Interview Essay Practice\n\nUse this tab when you want to build muscle memory by reading in longer blocks instead of short answers.  \nEverything here is grouped by theme, but it stays faithful to the same content used in the Q&A modules.  \nThe writing is intentionally a little more rhythmic, so it is easier to repeat out loud and remember.\n\n---\n\n## 1) My Overall Story\n\nIf I were introducing myself in a longer and more natural way, I would say this. I’m a software engineer focused on full-stack AI applications, but the deeper theme in my work is reliability. I like building features that look useful in a demo, but I care even more about what happens when the request takes too long, when a tool fails, when a provider behaves differently than expected, or when the system has to explain clearly what really happened. Across my projects, I work on backend orchestration, frontend behavior, AWS deployment, and documentation, but the part I value most is putting good engineering around AI so the final product is safer and more usable.\n\nThe common pattern across my portfolio is simple. I do not treat the model as the whole system. I treat it as one part of the system. That means I use validation, fallback behavior, tool boundaries, retries, quotas, and observability so the app behaves in a controlled way even when the model is inconsistent. That is the main idea I would want an interviewer to remember about me. I am not just interested in AI output quality. I am interested in the full path from model call to production behavior.\n\nI’m usually targeting Software Engineer or Full-Stack AI roles where I can build products end to end. I’m especially interested in roles where AI is part of a real workflow and needs strong engineering around it. That includes failure handling, deployment, monitoring, and safe interaction with tools or data. I enjoy the technical side, but I also enjoy explaining tradeoffs in plain English so teams can make better decisions. That combination of building and explaining is a big part of how I work.\n\n---\n\n## 2) How I Think About Reliable AI Systems\n\nMy general philosophy is that AI systems need a control layer around them. In plain English, that means the model should not be the only thing deciding what is true, what is allowed, or what gets shown to the user. I use structured outputs where possible, clear tool boundaries, fallback paths when the first option fails, and validation before risky output is accepted. That is how I reduce the gap between a smart answer and a trustworthy product. That is also how I make the system easier to operate when things go wrong.\n\nWhen I think about sync versus async processing, I keep the decision simple. If the work is short and predictable, sync is fine. If it is long-running, tool-heavy, or likely to hit request limits, async is safer. Async execution lets the request return quickly, gives the user progress instead of a timeout, and gives the backend more room to finish the real work correctly. So the rule I remember is simple: short and predictable can stay sync, long and fragile should go async.\n\nFallback behavior is also a big part of my design approach. I do not want one provider issue or one tool failure to break an entire workflow if the system can degrade safely instead. But I also do not use fallback as an excuse to lower quality silently. If the system falls back, I still want the output checked against the same standards. If it cannot meet the minimum quality bar, it should fail clearly instead of pretending success. So fallback is there to protect continuity, not to hide weakness.\n\nObservability matters for the same reason. AI products fail across many layers, not just one. A problem can come from the model, the tool, the worker, the API path, or the infrastructure. So I rely on logs, traces, and metrics to understand the real failure path. The model may be the most visible part of the system, but operationally it is just one layer inside a much larger flow. If I can see the path clearly, I can usually fix the issue faster and explain it better.\n\n---\n\n## 3) Digital Assistant Essay\n\nDigital Assistant is a good example of how I like to build AI products. At a surface level, it is a serverless AI assistant that can chat, search the web, export PDFs, send email, handle uploads, and manage user-approved memory. But what matters more to me is how the system behaves when those capabilities are used together in a real workflow. I like this project because it gives me a clean way to explain reliability in very practical terms. When people ask how many agents it has, I usually explain it as one main user-facing agent supported by an API layer, a background worker, MCP tool servers, and a memory approval layer rather than a swarm of separate agents.\n\nOne of the main design decisions in that project was using async jobs with an API and worker split. Tool-heavy requests can take longer than a normal synchronous request path should allow, especially in a serverless environment. So instead of forcing everything into one request and risking timeouts, the API returns a `202` with a `job_id` quickly and the worker handles the longer task in the background. That gives the user a better experience and makes the workflow more reliable.\n\nThe important frontend piece there is polling. The browser is not stuck waiting inside one long fragile request. It sends the initial request, gets back the `job_id`, and then checks `GET /jobs/{job_id}` at short intervals to ask, \"what is the current state of this same job?\" That fits this architecture well because the real work is happening in the worker, not in the browser and not in the original request. It also keeps the state model cleaner, because the `job_id` becomes the stable identity for that operation. The same ID is what the UI uses for status, what observability uses for tracing, and what the backend can use to return the current state instead of starting the same work twice if the client retries. The simple version I remember is this: return fast, finish safely, show progress clearly.\n\nAnother important decision was hybrid risk routing with truth-gated rendering. In plain English, the system does not treat every request the same way. If the request is low risk, like normal conversational help, it can stay on a lighter prose path with guardrails. If the request is high risk, like something that claims an email was sent, a PDF was created, or a tool produced a real artifact, it goes through a stricter canonical path. That path takes the tool outcomes, normalizes them into a verified context, and only then builds the final user-facing answer.\n\nThat is where the truth gate comes in. I did not want the system to say something like “email sent” just because the model planned to send one. So the high-risk flow is really classify, execute, normalize the real result, validate the claims, and then render. The gate checks whether the final answer matches what actually happened, whether links and placeholders are valid, and whether the response is making an action claim the tool did not prove. That is a small design change in theory, but in practice it makes a big difference in trust because the app stops sounding correct and starts being correct. For me, that is one of the clearest examples of good AI product design.\n\nI also treated memory carefully in this project. Memory is not stored automatically without control. The system proposes memory candidates, the user approves or rejects them, and only approved memory is used later. That keeps memory useful without letting it become noisy or risky. On top of that, I added quotas to control tokens, PDFs, and emails on the server side, because cost and abuse controls are part of product quality, not just billing concerns. In short, I wanted the assistant to feel helpful without becoming careless.\n\nFor observability, I used OpenTelemetry and Sentry with correlation fields like trace ID and job ID so one request can be followed across the API, worker, and tool layers. That matters because if a user says something failed, I want a way to see exactly where it failed and why. The tradeoff in the current project is that auth hardening is still more portfolio-scale than enterprise-scale, and I’m comfortable saying that directly. I would rather be honest about the next hardening step than oversell the current state.\n\n---\n\n## 4) IdeaGen Essay\n\nIdeaGen solves a different kind of problem. Many AI products stop at one-shot generation, but real decision-making usually needs more than a single clever answer. Teams need to compare options, explain tradeoffs, save artifacts, and produce outputs that other people can review later. That is why IdeaGen is built as a workflow: generate ideas, compare runs, summarize the strongest direction, and turn that into an execution plan framed as an Investment Readiness Assessment. The phrase I remember here is simple: not just generate, but compare, decide, and explain. If someone asks how many agents are working there, I usually say it is one orchestrated workflow with several specialized AI stages, including generation, ranking, comparison, reporting, recommendation, and delivery, not a free-form swarm.\n\nThe biggest engineering challenge there was handling provider instability and inconsistent outputs without letting the workflow become fragile. I used multi-provider routing with ordered fallback chains, but I did not want fallback to become random switching. The output still had to pass validation. I treated outputs like contracts, not casual text, so if the structure was wrong or the content was too weak, the workflow either retried with correction feedback or returned a safer fallback instead of quietly accepting bad output. That is how I kept the workflow useful without making it brittle.\n\nOne of the clearest examples of that approach is the deterministic financial modeling in IdeaGen. In that flow, I split the finance logic into two parts. The numbers are calculated predictably in code, while the model writes the narrative explanation around those numbers. I did that because fully model-generated finance can sound persuasive even when the numbers are invented. For this project, separating deterministic calculation from model narrative made the report more trustworthy. When I say it out loud, I remember it as numbers in code, explanation in AI.\n\nI also used cache-before-infer patterns for expensive steps like comparison and reporting. If the same request has already been solved, the system should be able to reuse that result instead of paying the same cost again. On the deployment side, the project now uses AWS App Runner with PostgreSQL on AWS RDS, which fits the goal better because saved runs, comparisons, and artifacts need durable shared state. The next logical step is not a database migration. It is moving the heaviest report and delivery paths into async worker-style execution so the request path stays responsive as load grows.\n\n---\n\n## 5) Autonomous Agentic Trader Essay\n\nAutonomous Agentic Trader is a production-style multi-agent trading simulation built for research and education, not financial advice. It runs four named trader personas, a live control desk UI, and an operator-controlled runtime. The main point of the project is not to show agents trading freely. It is to show how LLM reasoning can exist inside a deterministic execution system where proposals, decisions, and executions are all persisted and reviewable. That is the sentence I come back to whenever I explain it.\n\nAt the center of the system is a scheduler-managed trading engine plus a four-gate portfolio-control pipeline. Warren, George, Ray, and Cathie run autonomous trading cycles through MCP tool servers and generate structured buy or sell proposals. No agent trades directly. Every proposal goes through intake, deterministic risk evaluation, execution control, and an optional supporting review or extra review step for conflicts. That matters because the architecture separates idea generation from authority to act. In plain English, the agents can make suggestions, but the system still controls what is allowed to move forward.\n\nThat is why MCP boundaries are central to the design. The traders can call approved tools for balances, holdings, prices, research, and memory, but they cannot mutate core state however they want. Even the trading tools are proposal-oriented. A trader can express the intent to buy or sell, but that request is routed into the portfolio-control pipeline rather than directly to execution. I also kept research tools separate from execution paths, so outside information can influence reasoning without getting a direct path to place a trade. That separation makes the workflow easier to audit and makes failure handling much cleaner.\n\nThe strongest part of the system is the deterministic policy layer. Gate 2 evaluates each validated proposal against a fresh shared portfolio snapshot and applies 14+ risk rules in sequence, including exposure limits, drawdown entry blocks, re-entry cooldowns, minimum actionable size, intraday caps, price-source adequacy, and conflicting-signal checks. The outcomes are explicit: approved, reduced, or rejected, each with reason codes. If multiple proposals conflict on the same symbol, Gate 4 can add supporting review or extra review, but that layer is still advisory only. Deterministic policy keeps final authority.\n\nMarket data and UI delivery follow the same reliability mindset. Execution pricing uses Alpaca first, then Polygon, then cache. Brave Search is used separately for research, news summaries, and event-risk context, not as an execution price source. If the system still cannot get a trustworthy price, policy blocks the proposal instead of forcing a trade. On the frontend, the dashboard stays current through SSE with replay/resync and disconnected-only fallback polling, so the operator can reconnect without losing continuity. That control desk matters to me because it shows the operational side of the product, not just the agent narrative.\n\nThe deployment story is also part of why I include this project. FastAPI acts as the control plane and static host, PostgreSQL is the shared runtime truth, and the trading engine runs as a managed subprocess behind the API. I used Docker, Terraform, and GitHub Actions with OIDC so the environment and deployment path are repeatable. When I explain the project out loud, the phrase I use is simple: four agents can propose, but the system keeps authority over risk, execution, and live state.\n\n---\n\n## 6) MediNotes Essay\n\nMediNotes is probably the strongest example of my AI safety thinking in a high-stakes domain. It is a clinical documentation platform that takes different kinds of visit input and turns them into structured summaries with evidence links, quality checks, and resumable streaming. The important distinction is that it is not just a simple summarizer. It has one main workflow with separate steps for pulling out the source material, checking the draft, linking claims to evidence, keeping patient history, and handling follow-up chat. When I explain it out loud, I remember it as extract, review, ground, and deliver. If someone asks about agent count, this is the clearest answer in the portfolio because it uses eight specialized roles in a hub-and-spoke flow: summary, extraction, research, critic, evidence, memory, coordinator, and chat.\n\nThe hallucination-control story in MediNotes is stronger than a simple truth gate because the problem is different. In a transactional workflow, the main question might be whether an action really happened. In a clinical summary, the bigger question is whether the content is accurate and supported by the source material. So the system does not trust the first draft. It sends the draft through a review step that looks for made-up details, missing facts, contradictions, and safety gaps. If that review is weak, the system makes several new versions, checks them again, and chooses the strongest one. Before anything is shown, important statements are linked back to source snippets, and repeated review problems are turned into stronger instructions for later runs. So the mental pattern I keep is draft, review, improve, ground, and make the next run stricter too.\n\nThat is why I often explain MediNotes as proof that hallucination control is a system design problem, not just a prompt-writing problem. The system does not simply tell the model to be careful. It creates a workflow where weak output has a harder time reaching the user, and where repeated mistakes can strengthen the next run. That difference matters a lot in a high-stakes setting.\n\nMediNotes also supports streaming output. When a summary is being generated, the user can see progress while it is running. If the connection is lost, it can resume. This improves the experience because the user does not need to restart from zero.\n\nMediNotes includes a chat assistant too. The important part is that it is scoped. It only answers questions based on the patient’s visit summaries and the current consultation context. It does not act like a general chatbot. This boundary helps keep answers safe and consistent. For me, that is another repeatable rule: when context is missing, ask or refuse, do not guess.\n\nIf I were asked about next steps, I would say stricter policy gates, stronger audit controls, and broader evaluation coverage focused on clinical safety. In other words, the next stage is making the workflow even stricter and easier to review.\n\n---\n\n## 7) Cross-Project Operations, Scaling, and Quality\n\nAcross all four projects, I watch the same kinds of reliability signals first: success rate, response time, fallback rate, tool failure rate, and queue or backlog health where async work exists. Those numbers tell me whether users are getting stable outcomes, not just whether the process is still technically running. That is the operating view I try to keep in my head when I talk about reliability.\n\nIf I had to scale the systems, the main pattern would be similar across projects. I would move long-running work into workers where it is still synchronous, migrate local persistence bottlenecks to managed Postgres where needed, standardize tracing and correlation, and add clearer reliability targets and alerting around the most important workflows. In simple words, I would separate heavy work better, strengthen data storage, and make the system easier to observe.\n\nIf I had to explain tradeoffs to a stakeholder, I would usually give one recommendation, one tradeoff, and one fallback option. That format helps the conversation stay practical. If I had to handle ambiguity, I would reduce it by defining the input, expected output, constraints, and success metric as early as possible. Once those are clear, design gets much easier. That pattern is easy for me to remember because it repeats well in conversation.\n\nIf I had to compare where my current architecture is weakest, I would point to the places where heavy work is still synchronous and where local data storage limits concurrency. I think it is important to be honest about those limits while also being clear about the migration path. I do not think good engineering means pretending the first version is already final.\n\n---\n\n## 8) Behavioral and Closing Essay\n\nA challenging bug I like to talk about is the false action-claim problem, where model responses sounded successful even when the real tool had failed. That issue taught me something important: fluent language can create false trust very quickly. The fix was to treat tool results as the authority and validate the final response against those results. It was a good example of changing the system from “trust the model’s wording” to “trust the execution facts.” That sentence is easy for me to remember because it captures the whole lesson.\n\nA tradeoff I often mention is choosing simpler persistence or simpler infrastructure early so I can move faster and keep the design easy to understand. I do not see that as a weakness if the tradeoff is clearly explained, the limits are documented, and the upgrade path is already thought through. I think engineering maturity includes knowing when not to overbuild version one. Fast now and clear next step is usually the pattern I try to follow.\n\nIf I were closing an interview in a longer answer, I would say that I can build AI features that work under real constraints, not just under ideal demo conditions. I focus on correctness, reliability, clear architecture, and end-to-end delivery. I also care about communication, because I want technical decisions to be understandable to the team, not only to the engineer who wrote them. I want the system to be understandable, and I want my explanation of the system to be understandable too.\n\nAnd if I were asking the interviewer questions, I would usually ask where their current AI or automation workflows fail most in production, how they measure quality, and where they most need stronger engineering depth. Those questions help me understand whether the role is really about shipping dependable systems, which is the kind of work I want to do.\n"},{"id":"terraform","title":"Terraform Setup","file":"INTERVIEW_TERRAFORM_SETUP_GUIDE.md","markdown":"# Terraform Setup Deep Dive\n\nThis module is for interview prep when someone asks:\n\n- \"How did you set up Terraform in your projects?\"\n- \"How do your environments work?\"\n- \"What exactly did Terraform provision?\"\n- \"How did you connect Terraform to deployment?\"\n\nThe examples here are based on my real repos:\n\n- `twin/` for **Digital Assistant**\n- `autonomous-trader/` for **Autonomous Agentic Trader**\n\n---\n\n## 1) Short interview answer\n\n\"I use Terraform as the infrastructure source of truth, but I connect it tightly to the deploy path instead of treating it like a separate exercise. In Digital Assistant, Terraform provisions a serverless stack around Lambda, API Gateway, S3, CloudFront, IAM, ECR, and optional custom domains. In Autonomous Trader, Terraform provisions the EC2, ECR, security groups, Secrets Manager, optional RDS, Route53, and the runtime host setup that the app deploy script depends on. In both projects, I use environment-specific tfvars, workspaces, and GitHub Actions with OIDC so the same infra flow can run locally or from CI.\" \n\n---\n\n## 2) Common Terraform pattern I use\n\nAcross both repos, my Terraform setup follows the same high-level pattern:\n\n1. Keep the resource graph in `terraform/`.\n2. Separate environment values from resource definitions.\n3. Use `dev`, `test`, and `prod` workspaces.\n4. Resolve environment-specific values from `terraform.tfvars` files.\n5. Build and push the app image first when infra depends on a container image.\n6. Run `terraform apply` with the right workspace and var file.\n7. Use Terraform outputs to drive the rest of deployment.\n\nThat matters in interviews because it shows I am not just writing resources. I am designing a repeatable deployment system.\n\n---\n\n## 3) Digital Assistant: how I set up Terraform\n\nRepo: `twin/`\n\n### 3.1 What Terraform manages\n\nIn the Digital Assistant repo, Terraform provisions:\n\n- S3 bucket for frontend static hosting\n- S3 bucket for memory storage\n- Lambda API function\n- Lambda worker function\n- API Gateway\n- ECR repository for the Lambda image\n- IAM role and policy attachments for Lambda\n- CloudFront distribution\n- optional custom domain pieces\n- optional GitHub Actions role policy attachment\n\nThis is a serverless shape. The frontend is static, the backend is Lambda, and Terraform wires those AWS services together.\n\n### 3.2 Key Terraform files\n\n- `twin/terraform/main.tf`\n- `twin/terraform/variables.tf`\n- `twin/terraform/outputs.tf`\n- `twin/terraform/backend.tf`\n- `twin/terraform/github_actions.tf`\n- `twin/scripts/deploy.sh`\n\n### 3.2.1 `twin/terraform/main.tf`\n\nThis is the main infrastructure graph for Digital Assistant.\n\nWhat it defines:\n\n- S3 bucket for frontend hosting\n- S3 bucket for memory storage\n- Lambda API function\n- Lambda worker function\n- ECR repository and lifecycle policy\n- IAM role and policy attachments for Lambda\n- API Gateway\n- CloudFront distribution\n- optional domain-related resources\n\nWhy it matters:\n\nThis file is where the actual serverless shape is assembled. It shows that the app is not just \"a Lambda.\" It is a coordinated set of AWS services around static delivery, API entry, async worker execution, storage, and CDN delivery.\n\nConcrete example from the file:\n\n```hcl\nresource \"aws_lambda_function\" \"api\" {\n  package_type  = \"Image\"\n  image_uri     = \"${aws_ecr_repository.lambda.repository_url}:${var.lambda_image_tag}\"\n  function_name = \"${local.name_prefix}-api\"\n}\n```\n\nThat tells an interviewer I am deploying the backend as a container-based Lambda, not zip packaging.\n\n**How I would explain this file out loud:**  \n\"`main.tf` is where the actual AWS shape of Digital Assistant lives. It wires together the Lambda API, Lambda worker, S3 buckets, API Gateway, CloudFront, ECR, and IAM so the app has a complete serverless runtime instead of a single isolated function.\"\n\n### 3.2.2 `twin/terraform/variables.tf`\n\nThis file defines the configuration surface for the stack.\n\nWhat it contains:\n\n- project and environment naming\n- model/provider settings\n- Lambda memory and timeout settings\n- async worker settings\n- quota and timezone settings\n- OpenTelemetry settings\n- custom domain options\n- GitHub Actions role-policy attachment toggles\n\nWhy it matters:\n\nThis file is where I separate stable infrastructure code from environment-specific decisions. It is also how I avoid hardcoding runtime choices into the resource graph.\n\nExample:\n\n```hcl\nvariable \"worker_lambda_timeout\" {\n  description = \"Async worker Lambda timeout in seconds\"\n  type        = number\n  default     = 300\n}\n```\n\nThat shows the worker was intentionally sized differently from the API Lambda because they have different runtime behavior.\n\n**How I would explain this file out loud:**  \n\"`variables.tf` is the control surface for the stack. It lets me change environment behavior like provider choice, worker sizing, telemetry, async mode, and domain settings without rewriting the resource graph.\"\n\n### 3.2.3 `twin/terraform/outputs.tf`\n\nThis file exposes the values the deploy flow needs after `terraform apply`.\n\nWhat it outputs:\n\n- `api_gateway_url`\n- `api_custom_domain_url`\n- `cloudfront_url`\n- `s3_frontend_bucket`\n- `s3_memory_bucket`\n- `lambda_function_name`\n- `worker_function_name`\n- `custom_domain_url`\n- `ecr_repository_url`\n\nWhy it matters:\n\nTerraform outputs are how the infra layer hands off information to the deployment layer. Without outputs, the deploy script would need to rediscover resources manually.\n\nExample:\n\n```hcl\noutput \"cloudfront_url\" {\n  value = \"https://${aws_cloudfront_distribution.main.domain_name}\"\n}\n```\n\nThe deploy script and workflow can use that to verify or report the live URL.\n\n**How I would explain this file out loud:**  \n\"`outputs.tf` is how Terraform hands information to the deploy layer. After apply, I can read things like the API URL, CloudFront URL, bucket names, or function names without guessing or manually looking them up.\"\n\n### 3.2.4 `twin/terraform/backend.tf`\n\nThis file defines the Terraform backend type:\n\n```hcl\nterraform {\n  backend \"s3\" {}\n}\n```\n\nWhy it matters:\n\nI intentionally left the backend values out of the file so they can be injected per environment or per account at init time. That makes the repo easier to reuse across environments without rewriting the backend block.\n\nIn practice, the deploy script supplies:\n\n- backend bucket\n- backend key\n- backend region\n- DynamoDB lock table\n\nThat is a pragmatic setup when the same repo may be deployed by different operators or across different AWS accounts.\n\n**How I would explain this file out loud:**  \n\"`backend.tf` tells Terraform to use S3 state, but I inject the actual backend values at init time. That keeps the repo reusable across environments while still giving me remote state and locking.\"\n\n### 3.2.5 `twin/terraform/github_actions.tf`\n\nThis file is small, but important. It optionally attaches ECR permissions to an existing GitHub Actions IAM role.\n\nWhat it does:\n\n- conditionally attaches `AmazonEC2ContainerRegistryPowerUser`\n- only runs when `manage_github_actions_role_policies=true`\n- expects an existing `github_actions_role_name`\n\nWhy it matters:\n\nI did not force the entire GitHub IAM role to be created inside the app stack. Instead, I kept the role creation flexible, but allowed Terraform to attach the exact policy needed for image push behavior when desired.\n\nExample:\n\n```hcl\nresource \"aws_iam_role_policy_attachment\" \"github_actions_ecr_poweruser\" {\n  count = var.manage_github_actions_role_policies && var.github_actions_role_name != \"\" ? 1 : 0\n}\n```\n\nThis is a good interview example of balancing automation with practical IAM constraints.\n\n**How I would explain this file out loud:**  \n\"`github_actions.tf` is a small bridge between IaC and CI/CD. It can attach the ECR permissions my GitHub Actions role needs, but only when I explicitly enable that behavior.\"\n\n### 3.2.6 `twin/scripts/deploy.sh`\n\nThis file is not Terraform, but it is part of the Terraform delivery system.\n\nWhat it does:\n\n1. Resolves environment and project name.\n2. Initializes Terraform backend.\n3. Selects workspace.\n4. Creates ECR first with targeted apply.\n5. Builds and pushes the Lambda image.\n6. Applies the full Terraform stack.\n7. Updates Lambda functions by image digest.\n8. Builds the Next.js frontend.\n9. Uploads frontend assets to S3.\n10. Invalidates CloudFront.\n\nWhy it matters:\n\nThis is the file that turns Terraform from \"infrastructure code\" into a repeatable deploy path. In interviews, this is a strong point because it shows I understand the gap between provisioning resources and actually releasing a working application.\n\n**How I would explain this file out loud:**  \n\"`deploy.sh` is the release orchestrator. It initializes Terraform, picks the workspace, pushes the Lambda image, applies infra, publishes the frontend, and invalidates CloudFront so the whole app updates in one repeatable flow.\"\n\n### 3.3 Backend and workspaces\n\nThe repo uses an S3 backend, but the bucket and lock table are injected by the deploy script:\n\n```hcl\nterraform {\n  backend \"s3\" {\n    # Values are passed at init time\n  }\n}\n```\n\nThe deploy script initializes Terraform like this:\n\n```bash\nterraform init -reconfigure -input=false \\\n  -backend-config=\"bucket=${BACKEND_BUCKET}\" \\\n  -backend-config=\"key=terraform.tfstate\" \\\n  -backend-config=\"region=${AWS_REGION}\" \\\n  -backend-config=\"dynamodb_table=${BACKEND_DDB_TABLE}\" \\\n  -backend-config=\"encrypt=true\"\n```\n\nThen it creates or selects a workspace:\n\n```bash\nterraform workspace new dev\nterraform workspace select dev\n```\n\nThat gives me one shared codebase with isolated state per environment.\n\n### 3.4 How I pass environment values\n\nDigital Assistant uses:\n\n- `terraform.tfvars`\n- `prod.tfvars`\n- optional `terraform.tfvars.local`\n- `TF_VAR_*` values from GitHub Actions secrets and variables\n\nExamples from the real repo:\n\n- `TF_VAR_grok_api_key`\n- `TF_VAR_bedrock_model_id`\n- `TF_VAR_brave_api_key`\n- `TF_VAR_resend_api_key`\n- `TF_VAR_upstash_redis_rest_url`\n- `TF_VAR_upstash_redis_rest_token`\n- `TF_VAR_async_chat_enabled`\n\nI use Terraform variables for runtime configuration that needs to land in Lambda environment variables.\n\n### 3.5 Example deploy flow\n\nThe real deploy script does this:\n\n1. Initialize backend.\n2. Select workspace.\n3. Create ECR repository first with targeted apply.\n4. Build and push the Lambda image.\n5. Run full `terraform apply`.\n6. Force Lambda to refresh by image digest.\n7. Build the frontend.\n8. Upload static assets to S3.\n9. Invalidate CloudFront.\n\nExample commands:\n\n```bash\nterraform apply \\\n  -target=aws_ecr_repository.lambda \\\n  -target=aws_ecr_repository_policy.lambda \\\n  -var-file=\"prod.tfvars\" \\\n  -var=\"project_name=digital-assistant\" \\\n  -var=\"environment=prod\" \\\n  -auto-approve\n```\n\nThen:\n\n```bash\ndocker build --platform linux/amd64 -t \"${IMAGE_URI}\" backend\ndocker push \"${IMAGE_URI}\"\n```\n\nThen:\n\n```bash\nterraform apply \\\n  -var-file=\"prod.tfvars\" \\\n  -var=\"project_name=digital-assistant\" \\\n  -var=\"environment=prod\" \\\n  -var=\"lambda_image_tag=prod-latest\" \\\n  -auto-approve\n```\n\n### 3.6 Why this setup worked well\n\n- Terraform owns the infra graph.\n- The deploy script owns orchestration around image build and frontend publish.\n- Outputs like `api_gateway_url`, `cloudfront_url`, and `lambda_function_name` are fed back into deployment.\n- The setup works for `dev`, `test`, and `prod` without duplicating the resource code.\n\n### 3.7 What I would say in an interview\n\n\"For Digital Assistant, I used Terraform to provision the whole serverless shell around the app: Lambda, API Gateway, S3, CloudFront, ECR, IAM, and optional domain resources. I used workspaces for environment separation, passed runtime values through Terraform variables, and wrapped the full process in a deploy script so it could create ECR, push the Lambda image, apply infra, publish the frontend, and invalidate CloudFront in one repeatable flow.\"\n\n---\n\n## 4) Autonomous Trader: how I set up Terraform\n\nRepo: `autonomous-trader/`\n\n### 4.1 What Terraform manages\n\nIn Autonomous Trader, Terraform provisions a different kind of stack:\n\n- EC2 instance for the app host\n- security groups for app and RDS\n- ECR repository\n- IAM role and instance profile\n- Secrets Manager secrets\n- optional RDS PostgreSQL instance\n- Route53 record\n- HTTPS-related variables and Nginx/Certbot deploy path\n\nThis is not serverless. It is a containerized runtime on EC2 with optional managed Postgres.\n\n### 4.2 Key Terraform files\n\n- `autonomous-trader/terraform/main.tf`\n- `autonomous-trader/terraform/variables.tf`\n- `autonomous-trader/terraform/outputs.tf`\n- `autonomous-trader/terraform/versions.tf`\n- `autonomous-trader/scripts/terraform-deploy.sh`\n\n### 4.2.1 `autonomous-trader/terraform/main.tf`\n\nThis is the main infrastructure graph for the Trader stack.\n\nWhat it defines:\n\n- EC2 instance and surrounding networking dependencies\n- app and RDS security groups\n- IAM role and instance profile\n- ECR repository\n- Secrets Manager secrets\n- optional RDS PostgreSQL\n- Route53 record\n- supporting data sources for VPC, subnets, AMI, and caller identity\n\nWhy it matters:\n\nThis file shows that the Trader project is a full infrastructure runtime, not just a container on a VM. It also shows adoption logic for existing infrastructure, especially around existing EC2 instances.\n\nGood interview example:\n\n```hcl\ndata \"aws_instances\" \"by_tag\" {\n  filter {\n    name   = \"tag:Name\"\n    values = [\"${var.project_name}-app\"]\n  }\n}\n```\n\nThat tells the interviewer I considered re-deploy and adoption scenarios, not only first-time provisioning.\n\n**How I would explain this file out loud:**  \n\"`main.tf` in Trader is the full infra graph for the EC2-based runtime. It handles networking, IAM, ECR, Secrets Manager, optional RDS, and even existing-instance adoption instead of assuming every deploy is greenfield.\"\n\n### 4.2.2 `autonomous-trader/terraform/variables.tf`\n\nThis file defines the configuration surface for the Trader stack.\n\nWhat it contains:\n\n- AWS region and project naming\n- instance shape and AMI architecture\n- ECR repository settings\n- app environment secret settings\n- RDS creation toggles and sizing\n- HTTPS and Route53 options\n- deploy SSH and IAM helper variables\n\nWhy it matters:\n\nThis file is where I made the stack flexible enough to support:\n\n- EC2-only deploys\n- EC2 + RDS deploys\n- existing instance adoption\n- migration access\n- domain-enabled HTTPS deployments\n\nThat makes it much more than a single happy-path Terraform file.\n\n**How I would explain this file out loud:**  \n\"`variables.tf` is what makes the Trader stack flexible. It supports EC2-only or EC2-plus-RDS deploys, HTTPS options, existing instance adoption, and migration settings without changing the core infrastructure code.\"\n\n### 4.2.3 `autonomous-trader/terraform/outputs.tf`\n\nThis file exposes the values needed after apply.\n\nWhat it outputs:\n\n- `rds_password_secret_arn`\n- `image_uri`\n- `ecr_repository_url`\n- `app_env_secret_arn`\n- `public_dns`\n- `app_instance_id`\n- `app_domain_url`\n- `rds_database_url`\n\nWhy it matters:\n\nThese outputs are essential for the deploy script. For example:\n\n- `image_uri` tells the build/push logic what to publish\n- `app_env_secret_arn` tells the remote host where runtime env lives\n- `app_instance_id` is used for SSM-based rollout\n\nWithout outputs like these, the rollout script would be much more brittle.\n\n**How I would explain this file out loud:**  \n\"`outputs.tf` gives the deploy process the exact values it needs after apply, like the image URI, instance ID, public DNS, or secret ARN. That lets the rollout script continue cleanly without manual lookup.\"\n\n### 4.2.4 `autonomous-trader/terraform/versions.tf`\n\nThis file defines:\n\n- Terraform version constraints\n- provider version constraints\n- the S3 backend and DynamoDB lock table\n\nWhy it matters:\n\nIn this repo, the backend is explicit and checked into the infrastructure config:\n\n```hcl\nbackend \"s3\" {\n  bucket         = \"autonomous-trader-terraform-state-348375262167\"\n  key            = \"autonomous-trader/terraform.tfstate\"\n  region         = \"ap-southeast-1\"\n  dynamodb_table = \"autonomous-trader-terraform-locks\"\n  encrypt        = true\n}\n```\n\nThat makes the state model stable and predictable for the team, which is useful in a more operations-heavy repo.\n\n**How I would explain this file out loud:**  \n\"`versions.tf` locks the Terraform and provider versions, and it also defines the remote S3 backend with DynamoDB locking. In this repo, state management is part of the checked-in infrastructure contract.\"\n\n### 4.2.5 `autonomous-trader/scripts/terraform-deploy.sh`\n\nThis is the heart of the deploy process.\n\nWhat it does beyond Terraform:\n\n- resolves the right tfvars file per environment\n- converts `.env.<env>` into `terraform.auto.tfvars.json`\n- injects `rds_migration_ingress_cidr` from current public IP\n- detects existing instance IDs and persists them\n- ensures instance IAM policies are attached\n- runs `terraform plan`\n- runs `terraform apply`\n- builds and pushes the app image to ECR\n- reads runtime secrets from Secrets Manager\n- rolls the remote host with SSM or SSH\n- runs `alembic upgrade head` inside the container\n\nWhy it matters:\n\nThis file demonstrates real operational ownership. I am not just provisioning the instance and stopping there. I am handling rollout, secrets, migration, drift-reduction, and runtime restart in one controlled path.\n\n**How I would explain this file out loud:**  \n\"`terraform-deploy.sh` is where infrastructure provisioning turns into an actual production rollout. It resolves env files, applies Terraform, pushes the image, pulls secrets from Secrets Manager, rolls the EC2 host through SSM or SSH, and runs migrations inside the container.\"\n\n### 4.3 State and backend\n\nUnlike the Digital Assistant repo, Autonomous Trader has the S3 backend defined directly in `terraform/versions.tf`:\n\n```hcl\nbackend \"s3\" {\n  bucket         = \"autonomous-trader-terraform-state-348375262167\"\n  key            = \"autonomous-trader/terraform.tfstate\"\n  region         = \"ap-southeast-1\"\n  dynamodb_table = \"autonomous-trader-terraform-locks\"\n  encrypt        = true\n}\n```\n\nThat means remote state locking is part of the repo-level Terraform configuration.\n\n### 4.4 How I pass environment values\n\nThis repo uses environment-specific files like:\n\n- `terraform.tfvars.dev.local`\n- `terraform.tfvars.prod.local`\n- `terraform.tfvars.test.local`\n\nThe deploy script resolves them in this order:\n\n1. `terraform.tfvars.<env>.local`\n2. `terraform.tfvars.<env>`\n3. `terraform.tfvars.local`\n\nThen it copies the selected file to `terraform/terraform.tfvars`.\n\n### 4.5 How app secrets are handled\n\nThis repo does not keep the full app env in Terraform plain text. The deploy script converts `.env.<env>` into `terraform.auto.tfvars.json`, and Terraform stores runtime env vars into Secrets Manager.\n\nThat flow matters because it separates:\n\n- infra variables\n- deployment-time environment loading\n- runtime secret retrieval on EC2\n\nThe same script also:\n\n- detects the current public IP and injects `rds_migration_ingress_cidr`\n- detects existing EC2 instances by tag\n- persists `existing_instance_id` to avoid drift\n- ensures required instance IAM permissions are attached\n\n### 4.6 Example deploy flow\n\nThe real flow is:\n\n1. Choose `dev`, `test`, or `prod`.\n2. Copy the right tfvars file.\n3. Build `terraform.auto.tfvars.json` from `.env.<env>`.\n4. Run `terraform init`.\n5. Select or create workspace.\n6. Run `terraform plan` first to detect whether RDS will be created.\n7. Run `terraform apply`.\n8. Read outputs like `image_uri`, `app_env_secret_arn`, `public_dns`, and `app_instance_id`.\n9. Build and push the container to ECR.\n10. Use SSM or SSH to restart the EC2-hosted container.\n11. Pull env from Secrets Manager on the instance.\n12. Run `alembic upgrade head` inside the container.\n\nExample command:\n\n```bash\nbash scripts/terraform-deploy.sh prod\n```\n\nExample logic from the script:\n\n```bash\nterraform workspace select \"${deploy_env}\" 2>/dev/null || terraform workspace new \"${deploy_env}\"\nterraform plan -no-color -out=\"${plan_file}\"\nterraform apply -auto-approve\n```\n\nThen the remote host deploy path uses:\n\n```bash\naws secretsmanager get-secret-value ...\ndocker pull \"${IMAGE_URI}\"\ndocker run -d --name \"autonomous-trader\" ...\ndocker exec \"autonomous-trader\" bash -lc \"cd /app && alembic upgrade head\"\n```\n\n### 4.7 Why this setup worked well\n\n- Terraform owns the AWS resources.\n- The deploy script owns environment resolution, image build/push, and remote rollout.\n- Secrets Manager is part of the runtime design, not an afterthought.\n- Optional RDS creation is integrated into the same flow.\n- The deploy path can use SSM, which is safer than depending on direct SSH for everything.\n\n### 4.8 What I would say in an interview\n\n\"For Autonomous Trader, Terraform manages a more traditional runtime stack: EC2, security groups, ECR, Secrets Manager, and optional RDS. I used environment-specific tfvars, remote S3 state with DynamoDB locking, and a deploy script that turns `.env` into Terraform auto-vars, applies infra, pushes the container image, and then rolls the host forward through SSM while pulling runtime secrets from Secrets Manager.\"\n\n---\n\n## 5) Biggest differences between the two repos\n\n### Digital Assistant\n\n- Serverless runtime\n- Lambda image deployment\n- API Gateway + S3 + CloudFront\n- Backend config injected dynamically at `terraform init`\n- Frontend publish is part of deploy\n\n### Autonomous Trader\n\n- EC2-hosted container runtime\n- Optional RDS\n- Secrets Manager-centered env handling\n- Backend state fixed in repo config\n- Remote instance rollout after apply\n\nThis comparison is useful in interviews because it shows I can adapt Terraform to very different runtime shapes instead of using one AWS pattern everywhere.\n\n---\n\n## 6) Strong interview closing line\n\n\"I do not use Terraform as a standalone infra diagram generator. I use it as part of a repeatable delivery system. In one repo that meant Lambda, API Gateway, S3, and CloudFront. In the other, it meant EC2, Secrets Manager, ECR, and optional RDS. The common pattern was environment isolation, reproducible state, and deployment flows that read directly from Terraform outputs.\"\n"},{"id":"github-actions","title":"GitHub Actions","file":"INTERVIEW_GITHUB_ACTIONS_SETUP_GUIDE.md","markdown":"# GitHub Actions Setup Deep Dive\n\nThis module is for interview prep when someone asks:\n\n- \"How did you set up GitHub Actions?\"\n- \"How do you deploy without long-lived AWS keys?\"\n- \"What does your CI/CD pipeline actually do?\"\n- \"How do your workflows differ between projects?\"\n\nThe examples here are based on my real repos:\n\n- `twin/` for **Digital Assistant**\n- `autonomous-trader/` for **Autonomous Agentic Trader**\n\n---\n\n## 1) Short interview answer\n\n\"I use GitHub Actions as the orchestration layer around my deploy scripts, not as a place to rewrite all deployment logic in YAML. In both repos I use OIDC to assume AWS roles instead of storing long-lived AWS credentials. Digital Assistant uses GitHub Actions to deploy a Lambda plus CloudFront stack and then run post-deploy evals. Autonomous Trader uses GitHub Actions for CI, Docker build verification, environment-specific deploy, and guarded destroy flows. The workflows are thin, but they are tied closely to the real Terraform and deploy scripts in each repo.\"\n\n---\n\n## 2) The AWS authentication pattern I use\n\nBoth repos use:\n\n- `permissions: id-token: write`\n- `aws-actions/configure-aws-credentials`\n- a GitHub OIDC provider in AWS\n- an IAM role trusted by the specific GitHub repo\n\n### 2.1 Why I use OIDC\n\n- no long-lived AWS access keys in GitHub\n- short-lived credentials per run\n- easier auditability\n- better separation between repo permissions and cloud permissions\n\n### 2.2 Example trust policy\n\nThis is the pattern I use for the AWS-side role trust:\n\n```json\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n      \"Principal\": {\n        \"Federated\": \"arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com\"\n      },\n      \"Action\": \"sts:AssumeRoleWithWebIdentity\",\n      \"Condition\": {\n        \"StringEquals\": {\n          \"token.actions.githubusercontent.com:aud\": \"sts.amazonaws.com\"\n        },\n        \"StringLike\": {\n          \"token.actions.githubusercontent.com:sub\": \"repo:OWNER/REPO:*\"\n        }\n      }\n    }\n  ]\n}\n```\n\nIf I want to lock it down further to one branch, I use:\n\n```json\n\"token.actions.githubusercontent.com:sub\": \"repo:OWNER/REPO:ref:refs/heads/digital-assistant-terraform\"\n```\n\n### 2.3 Creating the OIDC provider\n\n```bash\naws iam create-open-id-connect-provider \\\n  --url https://token.actions.githubusercontent.com \\\n  --client-id-list sts.amazonaws.com \\\n  --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1\n```\n\n---\n\n## 3) Digital Assistant: how I use GitHub Actions\n\nRepo: `twin/`\n\n### 3.1 Workflow shape\n\nMain workflows:\n\n- `.github/workflows/deploy.yml`\n- `.github/workflows/destroy.yml`\n- `scripts/deploy.sh`\n- `terraform/github_actions.tf`\n- `DEPLOYMENT_GITHUB_ACTIONS.md`\n\nThe deploy workflow triggers on:\n\n- push to `digital-assistant-terraform`\n- manual `workflow_dispatch`\n\n### 3.1.1 `twin/.github/workflows/deploy.yml`\n\nThis is the main deployment workflow for the Digital Assistant repo.\n\nWhat it is responsible for:\n\n- assuming AWS via OIDC\n- installing the toolchain needed for deployment\n- calling the real deploy script\n- reading Terraform outputs\n- running post-deploy evals\n- invalidating CloudFront\n\nWhy it matters:\n\nThis file is intentionally orchestration-only. I do not overload the workflow with all deployment behavior. It stays readable, while the reusable deploy logic lives in scripts and Terraform.\n\n**How I would explain this file out loud:**  \n\"`deploy.yml` is the GitHub Actions entry point for releasing Digital Assistant. It assumes AWS through OIDC, installs the toolchain, runs the deploy script, reads outputs, runs evals, and invalidates CloudFront.\"\n\n### 3.1.2 `twin/.github/workflows/destroy.yml`\n\nThis is the manual teardown workflow.\n\nWhat it is responsible for:\n\n- forcing explicit environment choice\n- forcing typed confirmation\n- assuming AWS via OIDC\n- delegating actual destroy behavior to a script\n\nWhy it matters:\n\nI treat destroy as a first-class workflow, but with stricter safety than deploy. That is a useful interview point because it shows I think about safe automation, not just fast automation.\n\n**How I would explain this file out loud:**  \n\"`destroy.yml` is the guarded teardown path. It forces explicit environment choice and typed confirmation before it lets GitHub Actions remove anything.\"\n\n### 3.1.3 `twin/scripts/deploy.sh`\n\nThis is the actual deployment engine behind the workflow.\n\nWhat it is responsible for:\n\n- initializing Terraform backend config\n- selecting workspaces\n- creating ECR first\n- building and pushing the Lambda image\n- applying Terraform\n- refreshing Lambda image by digest\n- building and publishing the frontend\n- invalidating CloudFront\n\nWhy it matters:\n\nWhen I explain the CI/CD setup, this is one of the most important files because it connects GitHub Actions, Terraform, Docker, Lambda, S3, and CloudFront into one repeatable release path.\n\n**How I would explain this file out loud:**  \n\"`scripts/deploy.sh` is the actual deployment engine behind the workflow. GitHub Actions calls it, but this script is what really coordinates Terraform, Docker, Lambda updates, frontend publish, and CloudFront invalidation.\"\n\n### 3.1.4 `twin/terraform/github_actions.tf`\n\nThis file supports the CI/CD path by optionally attaching ECR permissions to an existing GitHub Actions IAM role.\n\nWhy it matters:\n\nIt shows that the deployment pipeline itself is part of the infrastructure model. I did not treat CI/CD permissions as something completely outside the IaC story.\n\n**How I would explain this file out loud:**  \n\"`terraform/github_actions.tf` is the small IaC piece that supports the pipeline itself. It can attach ECR permissions to the GitHub Actions role so CI/CD has exactly the image-push rights it needs.\"\n\n### 3.1.5 `twin/DEPLOYMENT_GITHUB_ACTIONS.md`\n\nThis is the detailed operational guide for the Digital Assistant GitHub Actions setup.\n\nWhat it explains:\n\n- OIDC provider creation\n- IAM trust policy\n- IAM permission examples\n- required GitHub secrets and variables\n- deploy and destroy walkthroughs\n\nWhy it matters:\n\nThis is useful in interviews because it shows the delivery path was not only implemented, but also documented deeply enough for repeatable setup.\n\n**How I would explain this file out loud:**  \n\"`DEPLOYMENT_GITHUB_ACTIONS.md` is the runbook for the whole CI/CD path. It documents OIDC, IAM, secrets, repo variables, deploy steps, and destroy steps so the pipeline is understandable and reproducible.\"\n\n### 3.2 What the deploy workflow does\n\nThe actual workflow does this:\n\n1. Checkout the repo.\n2. Assume AWS role via OIDC.\n3. Install Python.\n4. Install `uv`.\n5. Install Terraform.\n6. Install Node.js.\n7. Run `scripts/deploy.sh <env>`.\n8. Read Terraform outputs.\n9. Run post-deploy evals against the live API.\n10. Upload eval artifacts.\n11. Invalidate CloudFront.\n\nThat matters because it is not just \"deploy code.\" It also validates the deployment.\n\n### 3.3 Real OIDC step\n\n```yaml\npermissions:\n  id-token: write\n  contents: read\n\n- name: Configure AWS credentials\n  uses: aws-actions/configure-aws-credentials@v4\n  with:\n    role-to-assume: ${{ secrets.AWS_ROLE_ARN }}\n    role-session-name: github-actions-deploy\n    aws-region: ${{ secrets.DEFAULT_AWS_REGION }}\n```\n\n### 3.4 Real environment inputs\n\nThe workflow passes secrets and vars into Terraform through `TF_VAR_*` and script envs.\n\nExamples:\n\n- `AWS_ROLE_ARN`\n- `AWS_ACCOUNT_ID`\n- `DEFAULT_AWS_REGION`\n- `TF_VAR_grok_api_key`\n- `TF_VAR_bedrock_model_id`\n- `TF_VAR_brave_api_key`\n- `TF_VAR_resend_api_key`\n- `TF_VAR_upstash_redis_rest_url`\n- `TF_VAR_upstash_redis_rest_token`\n- `TF_VAR_async_chat_enabled`\n- `PROJECT_NAME`\n- `TF_BACKEND_BUCKET`\n- `TF_BACKEND_DDB_TABLE`\n\nThat separation is intentional:\n\n- GitHub secrets hold sensitive values\n- GitHub variables hold non-secret deploy settings\n- `TF_VAR_*` passes Terraform inputs cleanly\n- the deploy script remains the final orchestration layer\n\n### 3.5 Why I structured it this way\n\n- GitHub Actions stays readable.\n- The deploy script stays the source of truth for deployment behavior.\n- Terraform variables are passed in one consistent pattern.\n- I can reuse the same workflow for `dev`, `test`, and `prod`.\n\n### 3.6 Post-deploy evaluation step\n\nOne useful part of this repo is that the pipeline runs evals after deployment:\n\n```bash\npython3 backend/evals/run_evals.py \\\n  --api-url \"${{ steps.deploy_outputs.outputs.api_url }}\" \\\n  --user-id \"evaluser1234\" \\\n  --golden \"backend/evals/golden.jsonl\" \\\n  --out \"eval_results.json\"\n```\n\nThat is a strong interview point because it shows the deploy pipeline is tied to product quality, not just infra success.\n\n### 3.7 Destroy workflow\n\nThe repo also includes a manual destroy workflow with typed confirmation:\n\n```yaml\nworkflow_dispatch:\n  inputs:\n    environment:\n      type: choice\n      options: [dev, test, prod]\n    confirm:\n      description: \"Type the environment name to confirm destruction\"\n```\n\nThat is important because destructive operations should be manually gated.\n\n### 3.8 What I would say in an interview\n\n\"In Digital Assistant, GitHub Actions handles deployment orchestration around Terraform and the deploy script. It assumes AWS via OIDC, runs the environment-specific deploy, reads Terraform outputs, runs evals against the live API, uploads the eval results, and invalidates CloudFront so the latest frontend is served.\"\n\n---\n\n## 4) Autonomous Trader: how I use GitHub Actions\n\nRepo: `autonomous-trader/`\n\n### 4.1 Workflow shape\n\nMain workflows:\n\n- `.github/workflows/ci.yml`\n- `.github/workflows/deploy.yml`\n- `.github/workflows/destroy.yml`\n- `scripts/terraform-deploy.sh`\n- `scripts/terraform-destroy.sh`\n\nThis repo has a stronger CI story than the Digital Assistant repo because it includes:\n\n- backend tests against PostgreSQL\n- Docker build verification\n- conditional auto-deploy after CI success\n\n### 4.1.1 `autonomous-trader/.github/workflows/ci.yml`\n\nThis is the continuous integration workflow.\n\nWhat it is responsible for:\n\n- booting a PostgreSQL service container\n- running Alembic migrations\n- running backend tests\n- validating Docker buildability\n- optionally triggering prod deploy after successful CI on the main deploy branch\n\nWhy it matters:\n\nThis file shows that the repo has real CI, not just deployment automation. The pipeline checks schema compatibility, test correctness, and container health before rollout.\n\n**How I would explain this file out loud:**  \n\"`ci.yml` is the quality gate for Trader. It starts Postgres, runs migrations, runs backend tests, validates the Docker image, and can gate auto-deploy on successful CI.\"\n\n### 4.1.2 `autonomous-trader/.github/workflows/deploy.yml`\n\nThis is the main environment-scoped deployment workflow.\n\nWhat it is responsible for:\n\n- manual environment selection\n- AWS authentication with OIDC\n- writing the correct `.env.<env>` file from GitHub secrets\n- copying the right Terraform var file\n- invoking the real Terraform deploy script\n- cleaning sensitive files off the runner\n\nWhy it matters:\n\nThis file is where CI/CD connects to the actual runtime stack. It is especially important because Trader has more operational state than the Lambda-based app.\n\n**How I would explain this file out loud:**  \n\"`deploy.yml` is the environment-aware Trader release workflow. It assumes AWS via OIDC, builds the right env file from GitHub secrets, and then hands control to the Terraform deploy script.\"\n\n### 4.1.3 `autonomous-trader/.github/workflows/destroy.yml`\n\nThis is the destroy workflow for Trader.\n\nWhat it is responsible for:\n\n- exact confirmation gating\n- environment-scoped teardown\n- AWS authentication with OIDC\n- delegating the actual destroy path to scripts\n\nWhy it matters:\n\nThis is part of making infrastructure lifecycle complete. I can provision and deploy, but I can also safely tear environments down when needed.\n\n**How I would explain this file out loud:**  \n\"`destroy.yml` is the safe teardown workflow for Trader. It uses exact confirmation text and environment scoping so destructive automation stays controlled.\"\n\n### 4.1.4 `autonomous-trader/scripts/terraform-deploy.sh`\n\nThis is the real deployment engine behind the Trader workflow.\n\nWhat it is responsible for:\n\n- resolving env-specific tfvars\n- converting `.env.<env>` into Terraform auto-vars\n- running `terraform plan` and `apply`\n- building and pushing the image to ECR\n- reading outputs like `image_uri`, `app_env_secret_arn`, and `app_instance_id`\n- rolling the remote host through SSM or SSH\n- fetching runtime env from Secrets Manager\n- running migrations inside the container\n\nWhy it matters:\n\nThis file is where the workflow becomes a real operational rollout, not just a Terraform apply.\n\n**How I would explain this file out loud:**  \n\"`scripts/terraform-deploy.sh` is the operational core of Trader delivery. It resolves env config, applies Terraform, pushes the image, reads outputs, pulls secrets from Secrets Manager, rolls the host, and runs migrations.\"\n\n### 4.1.5 `autonomous-trader/scripts/terraform-destroy.sh`\n\nThis script backs the destroy workflow.\n\nWhy it matters:\n\nKeeping teardown logic in a script makes the destructive path easier to review and reuse than burying it all inside workflow YAML.\n\n**How I would explain this file out loud:**  \n\"`scripts/terraform-destroy.sh` keeps the teardown path reusable and reviewable. The workflow triggers it, but the actual destroy behavior lives in one place instead of being duplicated in YAML.\"\n\n### 4.2 CI workflow\n\nThe CI workflow does three main things:\n\n1. Start a PostgreSQL service container.\n2. Run backend tests after Alembic migrations.\n3. Build the Docker image on an ARM runner.\n\nReal example:\n\n```yaml\nservices:\n  postgres:\n    image: postgres:16\n    env:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: postgres\n      POSTGRES_DB: autonomous_trader_test\n```\n\nAnd:\n\n```yaml\n- name: Run Migrations\n  env:\n    DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/autonomous_trader_test\n  run: alembic upgrade head\n\n- name: Run Backend Tests\n  env:\n    DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/autonomous_trader_test\n    PERSISTENCE_BACKEND: postgresql\n    OPENAI_API_KEY: sk-test-dummy\n    ANTHROPIC_API_KEY: sk-ant-test-dummy\n    PYTHONPATH: ${{ github.workspace }}\n  run: pytest tests/ -v --tb=short\n```\n\n### 4.3 Deploy workflow\n\nTrader deploy is manual `workflow_dispatch` by environment, and the CI workflow can also auto-deploy prod after test and build pass on the main branch used for that repo.\n\nThe deploy workflow does this:\n\n1. Checkout code.\n2. Assume AWS role via OIDC.\n3. Verify identity.\n4. Set up Docker Buildx.\n5. Set up Terraform.\n6. Copy environment-specific `terraform.tfvars.<env>.local`.\n7. Write `.env.<env>` from GitHub secrets.\n8. Run `scripts/terraform-deploy.sh <env>`.\n9. Clean up secrets from the runner.\n\nThat cleanup step matters because it reduces how long sensitive material lives on the runner filesystem.\n\n### 4.4 Real OIDC step\n\n```yaml\n- name: Configure AWS Credentials (OIDC)\n  uses: aws-actions/configure-aws-credentials@v4\n  with:\n    role-to-assume: ${{ secrets.AWS_ROLE_ARN_TRADER }}\n    role-session-name: github-actions-deploy-${{ github.run_id }}\n    aws-region: ${{ secrets.DEFAULT_AWS_REGION }}\n```\n\n### 4.5 Why the env file step matters\n\nThis workflow writes a real `.env.<env>` file on the runner:\n\n```bash\ncat > .env.${DEPLOY_ENV} <<EOF\nOPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}\nDEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}\nGOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}\nGROK_API_KEY=${{ secrets.GROK_API_KEY }}\nBRAVE_API_KEY=${{ secrets.BRAVE_API_KEY }}\nALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}\nALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}\nPOLYGON_API_KEY=${{ secrets.POLYGON_API_KEY }}\nEXECUTION_MODE=${{ secrets.EXECUTION_MODE }}\nPERSISTENCE_BACKEND=${{ secrets.PERSISTENCE_BACKEND }}\nEOF\n```\n\nThen the deploy script converts that into Terraform auto-vars and Secrets Manager payloads for the runtime.\n\n### 4.6 Why this workflow is stronger than a simple deploy\n\n- CI validates migrations and tests.\n- Docker build is checked before deploy.\n- Deploy is environment-scoped.\n- Concurrency is controlled with:\n\n```yaml\nconcurrency:\n  group: deploy-${{ github.event.inputs.environment }}\n  cancel-in-progress: false\n```\n\n- Secrets are removed from the runner after deployment.\n\n### 4.7 Destroy workflow\n\nTrader also has a guarded destroy workflow with exact environment confirmation:\n\n```yaml\nif [[ \"${{ github.event.inputs.confirm }}\" != \"${{ github.event.inputs.environment }}\" ]]; then\n  exit 1\nfi\n```\n\nThat is a good example of how I add safety around destructive automation.\n\n### 4.8 What I would say in an interview\n\n\"In Autonomous Trader, GitHub Actions is doing both CI and deployment. CI brings up Postgres, runs migrations, runs backend tests, and verifies the Docker image. Deployment then assumes AWS via OIDC, writes the environment-specific runtime env file from GitHub secrets, runs the Terraform-based deploy script, and cleans up secrets afterward. It is a more operations-heavy pipeline than Digital Assistant because the runtime is EC2 plus optional RDS instead of Lambda and CloudFront.\"\n\n---\n\n## 5) Required GitHub repo configuration\n\n### 5.1 Digital Assistant secrets and vars\n\nCore examples:\n\n- `AWS_ROLE_ARN`\n- `AWS_ACCOUNT_ID`\n- `DEFAULT_AWS_REGION`\n- `GROK_API_KEY`\n- `GROK_API_URL`\n- `GROK_MODEL_ID`\n- `BEDROCK_MODEL_ID`\n- `AI_PROVIDER`\n- `BRAVE_API_KEY`\n- `RESEND_API_KEY`\n- `UPSTASH_REDIS_REST_URL`\n- `UPSTASH_REDIS_REST_TOKEN`\n- repo vars like `PROJECT_NAME`, `TF_BACKEND_BUCKET`, `TF_BACKEND_DDB_TABLE`\n\n### 5.2 Autonomous Trader secrets and vars\n\nCore examples:\n\n- `AWS_ROLE_ARN_TRADER`\n- `DEFAULT_AWS_REGION`\n- `OPENAI_API_KEY`\n- `DEEPSEEK_API_KEY`\n- `GOOGLE_API_KEY`\n- `GROK_API_KEY`\n- `BRAVE_API_KEY`\n- `ALPACA_API_KEY`\n- `ALPACA_SECRET_KEY`\n- `POLYGON_API_KEY`\n- `EXECUTION_MODE`\n- `PERSISTENCE_BACKEND`\n- repo var `APP_DOMAIN_NAME` for summary output\n\nThe main interview point is that I separate:\n\n- cloud auth secrets\n- provider/runtime secrets\n- non-secret repo variables\n- environment-scoped deploy settings\n\n---\n\n## 6) Biggest differences between the two repos\n\n### Digital Assistant\n\n- thin deploy workflow\n- serverless target\n- post-deploy evals\n- CloudFront invalidation after frontend publish\n- Terraform backend config injected at runtime\n\n### Autonomous Trader\n\n- stronger CI pipeline\n- database-backed test workflow\n- Docker build verification\n- environment-specific `.env` creation on runner\n- EC2 plus optional RDS rollout\n- guarded destroy and deploy workflows\n\nThis is useful in interviews because it shows I do not force one CI/CD style onto every project. I adapt the pipeline to the runtime shape.\n\n---\n\n## 7) Strong interview closing line\n\n\"I use GitHub Actions as an orchestration layer around real deployment scripts and Terraform. The important part is not just that the YAML runs. The important part is that the workflow assumes AWS through OIDC, injects the right environment-scoped values, runs the real deploy path, and adds safety checks like CI, evals, concurrency control, and guarded destroy flows.\"\n"},{"id":"drill30","title":"20-30 Second Drill","file":"MOCK_INTERVIEW_DRILL_20_30S.md","markdown":"# Mock Interview Drill (Spoken Practice Version)\n\nUse this for practice when you want fuller answers that still stay interview-friendly.  \nYou can aim for roughly 20-40 seconds per answer, but the goal here is clarity, not speed alone.\n\n- Start with a direct answer.\n- Add one simple explanation.\n- End with one concrete detail or tradeoff.\n\n---\n\n## Round 1: Intro\n\n### Q1) Tell me about yourself.\n**A:**  \nI’m a software engineer focused on full-stack AI systems. I like building end-to-end products, but the part I care about most is making AI features reliable, with clear guardrails, tool orchestration, async execution, and strong observability. That way the product works under real conditions, not only in a demo.\n**Cue words:** full-stack AI, reliable, end-to-end\n\n### Q2) What kind of role are you looking for?\n**A:**  \nI’m looking for Software Engineer or Full-Stack AI roles where I can build real product workflows and not just isolated features. I’m especially interested in teams that care about reliability, cloud deployment, and how AI behaves after launch.\n**Cue words:** software engineer, full-stack AI, production\n\n### Q3) What makes your portfolio different?\n**A:**  \nWhat makes it different is that I focus on system behavior, not just model output. In each project, I added controls around failure handling, tool boundaries, fallback behavior, and observability, so the apps are easier to trust and easier to operate.\n**Cue words:** real behavior, controls, trust\n\n---\n\n## Round 2: Digital Assistant\n\n### Q4) What is Digital Assistant?\n**A:**  \nDigital Assistant is a serverless AI assistant that can do more than chat. It supports search, PDF export, email delivery, uploads, and memory approval, and I designed it so long-running tool workflows can run in the background instead of breaking under request limits. I usually describe it as one main agent supported by an API, a worker, and tool servers.\n**Cue words:** serverless, tools, stable\n\n### Q5) Why async API + worker?\n**A:**  \nI used async execution because tool-heavy requests can take longer than a normal API request should. The API returns a job ID quickly, then a worker completes the heavy task in the background, which improves reliability and gives the user clearer progress.\n**Cue words:** timeout avoidance, job ID, progress\n\n### Q6) How do you prevent fake action claims?\n**A:**  \nI do not let the model claim a risky action succeeded just because it intended to do it. For high-risk paths, the system validates the actual tool result first, then builds the final response from verified facts, so it cannot say “email sent” unless the tool really succeeded.\n**Cue words:** actual tool result, validate, block\n\n### Q7) What does observability look like in this project?\n**A:**  \nI instrumented traces and logs with OpenTelemetry and sent the telemetry to Sentry. I use correlation fields like trace ID and job ID so I can follow one request across the API, worker, and tool layers and see exactly where it failed.\n**Cue words:** tracing, correlation, fast debugging\n\n---\n\n## Round 3: IdeaGen\n\n### Q8) What is IdeaGen?\n**A:**  \nIdeaGen is a decision workflow platform, not just a text generator. The user can generate ideas, compare results across OpenAI, Gemini, DeepSeek, and Grok, summarize what looks strongest, and turn that into an execution plan that is easier to share with stakeholders. I explain it as one orchestrated workflow with contract-first validation, deterministic finance, and persistent artifacts.\n**Cue words:** four providers, validation, decision-grade\n\n### Q9) Why multi-provider routing and fallback?\n**A:**  \nI used multi-provider routing because model behavior changes over time and no single provider is reliable in every situation. Ordered fallback helps keep the workflow available, but the output still has to pass the same validation rules before it is accepted.\n**Cue words:** continuity, fallback, validation\n\n### Q10) Explain your deterministic financial modeling approach simply.\n**A:**  \nI use deterministic financial modeling. I split the financial logic into two parts. The numbers come from predictable calculations in code, while the model writes the explanation around them
